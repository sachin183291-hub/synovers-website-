<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="pcbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#A78BFA" />
            <stop offset="100%" stop-color="#818CF8" />
        </linearGradient>
        <pattern id="pcbGrid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
            <circle cx="40" cy="40" r="1.5" fill="rgba(255,255,255,0.15)"/>
        </pattern>
        <filter id="pcbSoftGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="80" />
        </filter>
        <filter id="pcbGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- Base Background -->
    <rect width="800" height="450" fill="#0F172A" />

    <!-- Giant Glowing Orbs -->
    <circle cx="120" cy="80" r="260" fill="#7C3AED" opacity="0.22" filter="url(#pcbSoftGlow)" />
    <circle cx="720" cy="380" r="260" fill="#818CF8" opacity="0.2" filter="url(#pcbSoftGlow)" />

    <!-- Grid Overlay -->
    <rect width="800" height="450" fill="url(#pcbGrid)" />

    <!-- PCB Board visual (right side) -->
    <!-- PCB base (green board feel) -->
    <rect x="460" y="80" width="290" height="295" rx="10" fill="#1A2E1A" stroke="#A78BFA" stroke-width="1.5" opacity="0.95"/>
    <!-- Copper traces -->
    <line x1="480" y1="120" x2="730" y2="120" stroke="#C4B5FD" stroke-width="2" opacity="0.3"/>
    <line x1="480" y1="150" x2="620" y2="150" stroke="#C4B5FD" stroke-width="2" opacity="0.3"/>
    <line x1="620" y1="150" x2="620" y2="200" stroke="#C4B5FD" stroke-width="2" opacity="0.3"/>
    <line x1="480" y1="250" x2="730" y2="250" stroke="#C4B5FD" stroke-width="2" opacity="0.25"/>
    <line x1="480" y1="300" x2="600" y2="300" stroke="#C4B5FD" stroke-width="2" opacity="0.25"/>
    <line x1="600" y1="300" x2="600" y2="350" stroke="#C4B5FD" stroke-width="2" opacity="0.25"/>
    <line x1="680" y1="200" x2="680" y2="340" stroke="#C4B5FD" stroke-width="2" opacity="0.25"/>
    <!-- Via holes -->
    <circle cx="520" cy="120" r="4" fill="none" stroke="#C4B5FD" stroke-width="1.5" opacity="0.6"/>
    <circle cx="560" cy="120" r="4" fill="none" stroke="#C4B5FD" stroke-width="1.5" opacity="0.6"/>
    <circle cx="620" cy="150" r="4" fill="none" stroke="#C4B5FD" stroke-width="1.5" opacity="0.6"/>
    <circle cx="680" cy="200" r="4" fill="none" stroke="#C4B5FD" stroke-width="1.5" opacity="0.6"/>
    <circle cx="600" cy="300" r="4" fill="none" stroke="#C4B5FD" stroke-width="1.5" opacity="0.5"/>
    <!-- IC component -->
    <rect x="530" y="170" width="70" height="70" rx="4" fill="#1E293B" stroke="#A78BFA" stroke-width="1.5" opacity="0.9"/>
    <text x="565" y="207" text-anchor="middle" fill="#C4B5FD" font-size="10" font-family="monospace" font-weight="700" opacity="0.85">MCU</text>
    <!-- IC pins left -->
    <rect x="519" y="177" width="13" height="5" rx="1" fill="#A78BFA" opacity="0.6"/>
    <rect x="519" y="187" width="13" height="5" rx="1" fill="#A78BFA" opacity="0.6"/>
    <rect x="519" y="197" width="13" height="5" rx="1" fill="#A78BFA" opacity="0.5"/>
    <rect x="519" y="207" width="13" height="5" rx="1" fill="#A78BFA" opacity="0.5"/>
    <rect x="519" y="217" width="13" height="5" rx="1" fill="#A78BFA" opacity="0.5"/>
    <!-- IC pins right -->
    <rect x="598" y="177" width="13" height="5" rx="1" fill="#A78BFA" opacity="0.6"/>
    <rect x="598" y="187" width="13" height="5" rx="1" fill="#A78BFA" opacity="0.6"/>
    <rect x="598" y="197" width="13" height="5" rx="1" fill="#A78BFA" opacity="0.5"/>
    <rect x="598" y="207" width="13" height="5" rx="1" fill="#A78BFA" opacity="0.5"/>
    <rect x="598" y="217" width="13" height="5" rx="1" fill="#A78BFA" opacity="0.5"/>
    <!-- Capacitors -->
    <rect x="640" y="175" width="20" height="30" rx="3" fill="#374151" stroke="#C4B5FD" stroke-width="1" opacity="0.7"/>
    <rect x="668" y="175" width="20" height="30" rx="3" fill="#374151" stroke="#C4B5FD" stroke-width="1" opacity="0.7"/>
    <!-- Resistors -->
    <rect x="640" y="220" width="30" height="14" rx="2" fill="#4B3800" stroke="#C4B5FD" stroke-width="1" opacity="0.7"/>
    <line x1="638" y1="227" x2="640" y2="227" stroke="#C4B5FD" stroke-width="1.5" opacity="0.6"/>
    <line x1="670" y1="227" x2="672" y2="227" stroke="#C4B5FD" stroke-width="1.5" opacity="0.6"/>
    <!-- Connector -->
    <rect x="470" y="310" width="140" height="30" rx="4" fill="#1E3A2F" stroke="#4ADE80" stroke-width="1" opacity="0.8"/>
    <rect x="476" y="316" width="10" height="18" rx="2" fill="#4ADE80" opacity="0.5"/>
    <rect x="490" y="316" width="10" height="18" rx="2" fill="#4ADE80" opacity="0.5"/>
    <rect x="504" y="316" width="10" height="18" rx="2" fill="#4ADE80" opacity="0.5"/>
    <rect x="518" y="316" width="10" height="18" rx="2" fill="#4ADE80" opacity="0.5"/>

    <!-- Content (left) -->
    <g transform="translate(60, 90)">
        <!-- Top Tech Pill -->
        <rect x="0" y="0" width="155" height="32" rx="16" fill="rgba(167,139,250,0.12)" stroke="rgba(167,139,250,0.35)" stroke-width="1" />
        <circle cx="16" cy="16" r="6" fill="#A78BFA" />
        <text x="32" y="21" fill="#C4B5FD" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" letter-spacing="1">HARDWARE TRACK</text>

        <!-- Main Title -->
        <text x="0" y="95" fill="#ffffff" font-size="47" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">PCB</text>
        <text x="0" y="148" fill="#C4B5FD" font-size="47" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">Designing</text>

        <!-- Subtitle -->
        <text x="0" y="195" fill="rgba(255,255,255,0.65)" font-size="20" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="400">Layout, Gerber &amp; Fabrication</text>

        <!-- Tags row -->
        <rect x="0" y="218" width="56" height="28" rx="14" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
        <text x="28" y="237" text-anchor="middle" fill="#C4B5FD" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">PCB</text>

        <rect x="68" y="218" width="82" height="28" rx="14" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
        <text x="109" y="237" text-anchor="middle" fill="#C4B5FD" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">Schematic</text>

        <rect x="162" y="218" width="70" height="28" rx="14" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
        <text x="197" y="237" text-anchor="middle" fill="#C4B5FD" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">Gerber</text>

        <!-- CTA button -->
        <rect x="0" y="260" width="150" height="44" rx="10" fill="url(#pcbGrad)" opacity="0.9" filter="url(#pcbGlow)"/>
        <text x="75" y="288" fill="#ffffff" font-size="16" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" text-anchor="middle">Enroll Now →</text>
    </g>
</svg>