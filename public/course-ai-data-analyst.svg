<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="daGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#F59E0B" />
            <stop offset="100%" stop-color="#FDE68A" />
        </linearGradient>
        <pattern id="daGrid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
            <circle cx="40" cy="40" r="1.5" fill="rgba(255,255,255,0.15)"/>
        </pattern>
        <filter id="daSoftGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="80" />
        </filter>
        <filter id="daGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <rect width="800" height="450" fill="#0F172A" />
    <circle cx="70" cy="70" r="270" fill="#B45309" opacity="0.22" filter="url(#daSoftGlow)" />
    <circle cx="760" cy="400" r="260" fill="#F59E0B" opacity="0.2" filter="url(#daSoftGlow)" />
    <rect width="800" height="450" fill="url(#daGrid)" />

    <!-- Analytics dashboard visualization (right side) -->
    <!-- Dashboard frame -->
    <rect x="455" y="75" width="320" height="295" rx="14" fill="#0A1220" stroke="#F59E0B" stroke-width="1.5" opacity="0.95"/>
    <!-- Header bar -->
    <rect x="455" y="75" width="320" height="36" rx="14" fill="#1A1A08" opacity="0.9"/>
    <rect x="455" y="97" width="320" height="14" fill="#1A1A08"/>
    <text x="615" y="98" text-anchor="middle" fill="#FDE68A" font-size="12" font-family="monospace" opacity="0.85">AI Analytics Dashboard</text>

    <!-- KPI cards row -->
    <rect x="465" y="122" width="88" height="52" rx="8" fill="#1A1205" stroke="#F59E0B" stroke-width="1" opacity="0.85"/>
    <text x="509" y="140" text-anchor="middle" fill="#FDE68A" font-size="9" font-family="monospace" opacity="0.7">Revenue</text>
    <text x="509" y="158" text-anchor="middle" fill="#F59E0B" font-size="14" font-family="monospace" font-weight="700" opacity="0.9">₹2.4M</text>
    <text x="509" y="170" text-anchor="middle" fill="#22C55E" font-size="9" font-family="monospace" opacity="0.8">↑ 18%</text>

    <rect x="561" y="122" width="88" height="52" rx="8" fill="#1A1205" stroke="#F59E0B" stroke-width="1" opacity="0.85"/>
    <text x="605" y="140" text-anchor="middle" fill="#FDE68A" font-size="9" font-family="monospace" opacity="0.7">Users</text>
    <text x="605" y="158" text-anchor="middle" fill="#F59E0B" font-size="14" font-family="monospace" font-weight="700" opacity="0.9">48.2K</text>
    <text x="605" y="170" text-anchor="middle" fill="#22C55E" font-size="9" font-family="monospace" opacity="0.8">↑ 25%</text>

    <rect x="657" y="122" width="88" height="52" rx="8" fill="#1A1205" stroke="#F59E0B" stroke-width="1" opacity="0.85"/>
    <text x="701" y="140" text-anchor="middle" fill="#FDE68A" font-size="9" font-family="monospace" opacity="0.7">Conversion</text>
    <text x="701" y="158" text-anchor="middle" fill="#F59E0B" font-size="14" font-family="monospace" font-weight="700" opacity="0.9">7.8%</text>
    <text x="701" y="170" text-anchor="middle" fill="#EF4444" font-size="9" font-family="monospace" opacity="0.8">↓ 2%</text>

    <!-- Line chart -->
    <rect x="465" y="184" width="192" height="100" rx="8" fill="#100D02" stroke="#F59E0B" stroke-width="1" opacity="0.85"/>
    <text x="475" y="198" fill="#FDE68A" font-size="9" font-family="monospace" opacity="0.7">Sales Trend</text>
    <!-- Chart grid lines -->
    <line x1="475" y1="270" x2="648" y2="270" stroke="#F59E0B" stroke-width="0.5" opacity="0.2"/>
    <line x1="475" y1="255" x2="648" y2="255" stroke="#F59E0B" stroke-width="0.5" opacity="0.15"/>
    <line x1="475" y1="240" x2="648" y2="240" stroke="#F59E0B" stroke-width="0.5" opacity="0.15"/>
    <!-- Line chart path -->
    <polyline points="478,265 498,258 518,262 538,245 558,250 578,235 598,240 618,228 638,232 648,220" stroke="#F59E0B" stroke-width="2" fill="none" opacity="0.9"/>
    <!-- Area fill -->
    <polygon points="478,265 498,258 518,262 538,245 558,250 578,235 598,240 618,228 638,232 648,220 648,270 478,270" fill="#F59E0B" opacity="0.08"/>
    <!-- Data points -->
    <circle cx="538" cy="245" r="3" fill="#F59E0B" opacity="0.9"/>
    <circle cx="578" cy="235" r="3" fill="#FDE68A" opacity="0.9"/>
    <circle cx="618" cy="228" r="3" fill="#F59E0B" opacity="0.9"/>

    <!-- Bar chart -->
    <rect x="665" y="184" width="100" height="100" rx="8" fill="#100D02" stroke="#F59E0B" stroke-width="1" opacity="0.85"/>
    <text x="715" y="198" text-anchor="middle" fill="#FDE68A" font-size="9" font-family="monospace" opacity="0.7">By Region</text>
    <!-- Bars -->
    <rect x="675" y="240" width="14" height="34" rx="2" fill="#F59E0B" opacity="0.7"/>
    <rect x="693" y="248" width="14" height="26" rx="2" fill="#FDE68A" opacity="0.6"/>
    <rect x="711" y="232" width="14" height="42" rx="2" fill="#F59E0B" opacity="0.8"/>
    <rect x="729" y="255" width="14" height="19" rx="2" fill="#FDE68A" opacity="0.5"/>
    <rect x="747" y="244" width="14" height="30" rx="2" fill="#F59E0B" opacity="0.65"/>
    <line x1="675" y1="274" x2="757" y2="274" stroke="#F59E0B" stroke-width="0.5" opacity="0.3"/>

    <!-- Pie chart hint -->
    <rect x="465" y="294" width="100" height="66" rx="8" fill="#100D02" stroke="#F59E0B" stroke-width="1" opacity="0.85"/>
    <circle cx="515" cy="327" r="22" fill="none" stroke="#F59E0B" stroke-width="10" stroke-dasharray="69 100" stroke-dashoffset="25" opacity="0.75"/>
    <circle cx="515" cy="327" r="22" fill="none" stroke="#22C55E" stroke-width="10" stroke-dasharray="21 100" stroke-dashoffset="-44" opacity="0.6"/>
    <circle cx="515" cy="327" r="22" fill="none" stroke="#EF4444" stroke-width="10" stroke-dasharray="10 100" stroke-dashoffset="-65" opacity="0.5"/>

    <!-- Data table hint -->
    <rect x="573" y="294" width="192" height="66" rx="8" fill="#100D02" stroke="#F59E0B" stroke-width="1" opacity="0.85"/>
    <text x="583" y="310" fill="#FDE68A" font-size="9" font-family="monospace" opacity="0.7">Product   Q1    Q2</text>
    <line x1="583" y1="315" x2="755" y2="315" stroke="#F59E0B" stroke-width="0.5" opacity="0.3"/>
    <text x="583" y="328" fill="#5EEAD4" font-size="9" font-family="monospace" opacity="0.7">Laptop    432   521</text>
    <text x="583" y="341" fill="#5EEAD4" font-size="9" font-family="monospace" opacity="0.6">Mobile    876   940</text>
    <text x="583" y="354" fill="#5EEAD4" font-size="9" font-family="monospace" opacity="0.55">Tablet    210   278</text>

    <!-- Content (left) -->
    <g transform="translate(60, 90)">
        <rect x="0" y="0" width="155" height="32" rx="16" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.35)" stroke-width="1" />
        <circle cx="16" cy="16" r="6" fill="#F59E0B" />
        <text x="32" y="21" fill="#FDE68A" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" letter-spacing="1">DATA TRACK</text>

        <text x="0" y="95" fill="#ffffff" font-size="44" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">AI + Data</text>
        <text x="0" y="148" fill="#FDE68A" font-size="44" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">Analyst</text>
        <text x="0" y="195" fill="rgba(255,255,255,0.65)" font-size="19" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="400">Power BI, Excel &amp; AI Analytics</text>

        <rect x="0" y="218" width="68" height="28" rx="14" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
        <text x="34" y="237" text-anchor="middle" fill="#FDE68A" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">Power BI</text>
        <rect x="80" y="218" width="54" height="28" rx="14" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
        <text x="107" y="237" text-anchor="middle" fill="#FDE68A" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">Excel</text>
        <rect x="146" y="218" width="46" height="28" rx="14" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
        <text x="169" y="237" text-anchor="middle" fill="#FDE68A" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">SQL</text>

        <rect x="0" y="260" width="150" height="44" rx="10" fill="url(#daGrad)" opacity="0.9" filter="url(#daGlow)"/>
        <text x="75" y="288" fill="#0F172A" font-size="16" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" text-anchor="middle">Enroll Now →</text>
    </g>
</svg>