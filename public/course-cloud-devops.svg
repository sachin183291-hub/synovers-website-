<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0EA5E9" />
            <stop offset="100%" stop-color="#38BDF8" />
        </linearGradient>
        <pattern id="cloudGrid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
            <circle cx="40" cy="40" r="1.5" fill="rgba(255,255,255,0.15)"/>
        </pattern>
        <filter id="cloudSoftGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="80" />
        </filter>
        <filter id="cloudGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <rect width="800" height="450" fill="#0F172A" />
    <circle cx="70" cy="70" r="260" fill="#0369A1" opacity="0.25" filter="url(#cloudSoftGlow)" />
    <circle cx="760" cy="400" r="270" fill="#0EA5E9" opacity="0.2" filter="url(#cloudSoftGlow)" />
    <rect width="800" height="450" fill="url(#cloudGrid)" />

    <!-- Cloud infrastructure visualization (right side) -->
    <!-- Cloud shape (top) -->
    <ellipse cx="630" cy="110" rx="110" ry="45" fill="#1E3A4A" stroke="#0EA5E9" stroke-width="1.5" opacity="0.85"/>
    <ellipse cx="580" cy="120" rx="65" ry="38" fill="#1E3A4A" stroke="#0EA5E9" stroke-width="1" opacity="0.7"/>
    <ellipse cx="680" cy="118" rx="55" ry="35" fill="#1E3A4A" stroke="#0EA5E9" stroke-width="1" opacity="0.7"/>
    <text x="630" y="118" text-anchor="middle" fill="#7DD3FC" font-size="13" font-family="monospace" font-weight="700" opacity="0.9">AWS / Azure</text>

    <!-- Cloud down-lines to servers -->
    <line x1="580" y1="155" x2="530" y2="200" stroke="#0EA5E9" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
    <line x1="630" y1="155" x2="630" y2="200" stroke="#0EA5E9" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
    <line x1="680" y1="155" x2="730" y2="200" stroke="#0EA5E9" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>

    <!-- Server boxes -->
    <!-- Docker box -->
    <rect x="490" y="200" width="85" height="70" rx="8" fill="#0F2535" stroke="#0EA5E9" stroke-width="1.5" opacity="0.9"/>
    <rect x="498" y="208" width="69" height="14" rx="3" fill="#0EA5E9" opacity="0.25"/>
    <text x="532" y="220" text-anchor="middle" fill="#7DD3FC" font-size="10" font-family="monospace" font-weight="700">Docker</text>
    <rect x="500" y="228" width="22" height="8" rx="2" fill="#22C55E" opacity="0.6"/>
    <rect x="526" y="228" width="22" height="8" rx="2" fill="#22C55E" opacity="0.5"/>
    <rect x="500" y="240" width="22" height="8" rx="2" fill="#0EA5E9" opacity="0.5"/>
    <rect x="526" y="240" width="22" height="8" rx="2" fill="#EF4444" opacity="0.4"/>
    <!-- Kubernetes box -->
    <rect x="587" y="200" width="85" height="70" rx="8" fill="#0F2535" stroke="#38BDF8" stroke-width="1.5" opacity="0.9"/>
    <rect x="595" y="208" width="69" height="14" rx="3" fill="#38BDF8" opacity="0.25"/>
    <text x="629" y="220" text-anchor="middle" fill="#7DD3FC" font-size="10" font-family="monospace" font-weight="700">K8s</text>
    <!-- k8s hexagon hint -->
    <polygon points="629,230 643,238 643,254 629,262 615,254 615,238" fill="none" stroke="#38BDF8" stroke-width="1.5" opacity="0.6"/>
    <text x="629" y="251" text-anchor="middle" fill="#38BDF8" font-size="9" font-family="monospace" opacity="0.8">⎈</text>
    <!-- CI/CD box -->
    <rect x="684" y="200" width="85" height="70" rx="8" fill="#0F2535" stroke="#0EA5E9" stroke-width="1.5" opacity="0.9"/>
    <rect x="692" y="208" width="69" height="14" rx="3" fill="#0EA5E9" opacity="0.25"/>
    <text x="726" y="220" text-anchor="middle" fill="#7DD3FC" font-size="10" font-family="monospace" font-weight="700">CI/CD</text>
    <!-- Pipeline arrow -->
    <rect x="696" y="228" width="14" height="10" rx="2" fill="#22C55E" opacity="0.7"/>
    <line x1="710" y1="233" x2="716" y2="233" stroke="#7DD3FC" stroke-width="1.5" opacity="0.7"/>
    <rect x="716" y="228" width="14" height="10" rx="2" fill="#0EA5E9" opacity="0.7"/>
    <line x1="730" y1="233" x2="736" y2="233" stroke="#7DD3FC" stroke-width="1.5" opacity="0.7"/>
    <rect x="736" y="228" width="14" height="10" rx="2" fill="#F59E0B" opacity="0.7"/>
    <!-- monitoring bars at bottom -->
    <rect x="696" y="242" width="8" height="16" rx="1" fill="#22C55E" opacity="0.6"/>
    <rect x="707" y="248" width="8" height="10" rx="1" fill="#0EA5E9" opacity="0.5"/>
    <rect x="718" y="244" width="8" height="14" rx="1" fill="#38BDF8" opacity="0.5"/>
    <rect x="729" y="250" width="8" height="8" rx="1" fill="#22C55E" opacity="0.4"/>

    <!-- Connection lines between servers -->
    <line x1="575" y1="235" x2="587" y2="235" stroke="#7DD3FC" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
    <line x1="672" y1="235" x2="684" y2="235" stroke="#7DD3FC" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>

    <!-- Monitor screen at bottom -->
    <rect x="510" y="295" width="250" height="100" rx="10" fill="#0A1A28" stroke="#0EA5E9" stroke-width="1.5" opacity="0.85"/>
    <rect x="520" y="305" width="230" height="78" rx="6" fill="#020D18" opacity="0.8"/>
    <!-- Terminal lines -->
    <text x="528" y="323" fill="#22C55E" font-size="10" font-family="monospace" opacity="0.85">$ kubectl get pods</text>
    <text x="528" y="338" fill="#7DD3FC" font-size="10" font-family="monospace" opacity="0.7">NAME         READY  STATUS</text>
    <text x="528" y="353" fill="#38BDF8" font-size="10" font-family="monospace" opacity="0.7">api-pod      1/1    Running</text>
    <text x="528" y="368" fill="#38BDF8" font-size="10" font-family="monospace" opacity="0.6">web-pod      1/1    Running</text>

    <!-- Content (left) -->
    <g transform="translate(60, 90)">
        <rect x="0" y="0" width="165" height="32" rx="16" fill="rgba(14,165,233,0.12)" stroke="rgba(14,165,233,0.35)" stroke-width="1" />
        <circle cx="16" cy="16" r="6" fill="#0EA5E9" />
        <text x="32" y="21" fill="#7DD3FC" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" letter-spacing="1">DEVOPS TRACK</text>

        <text x="0" y="95" fill="#ffffff" font-size="42" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">Cloud &amp;</text>
        <text x="0" y="148" fill="#38BDF8" font-size="42" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">DevOps</text>
        <text x="0" y="195" fill="rgba(255,255,255,0.65)" font-size="19" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="400">AWS, Azure &amp; CI/CD Pipelines</text>

        <rect x="0" y="218" width="52" height="28" rx="14" fill="rgba(14,165,233,0.15)" stroke="rgba(14,165,233,0.4)" stroke-width="1"/>
        <text x="26" y="237" text-anchor="middle" fill="#7DD3FC" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">AWS</text>
        <rect x="64" y="218" width="68" height="28" rx="14" fill="rgba(14,165,233,0.15)" stroke="rgba(14,165,233,0.4)" stroke-width="1"/>
        <text x="98" y="237" text-anchor="middle" fill="#7DD3FC" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">Docker</text>
        <rect x="144" y="218" width="52" height="28" rx="14" fill="rgba(14,165,233,0.15)" stroke="rgba(14,165,233,0.4)" stroke-width="1"/>
        <text x="170" y="237" text-anchor="middle" fill="#7DD3FC" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">K8s</text>

        <rect x="0" y="260" width="150" height="44" rx="10" fill="url(#cloudGrad)" opacity="0.9" filter="url(#cloudGlow)"/>
        <text x="75" y="288" fill="#ffffff" font-size="16" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" text-anchor="middle">Enroll Now →</text>
    </g>
</svg>