    <rect x="640" y="316" width="50" height="38" rx="6" fill="#0A0F1A" stroke="#F97316" stroke-width="1" opacity="0.9"/>
    <text x="665" y="331" text-anchor="middle" fill="#FDBA74" font-size="9" font-family="monospace">Docker</text>
    <text x="665" y="344" text-anchor="middle" fill="#FDBA74" font-size="8" font-family="monospace">Jenkins</text>
    <rect x="696" y="316" width="52" height="38" rx="6" fill="#7C2D12" opacity="0.6" stroke="#F97316" stroke-width="1"/>
    <text x="722" y="331" text-anchor="middle" fill="#FED7AA" font-size="9" font-family="monospace">AI</text>
    <text x="722" y="344" text-anchor="middle" fill="#FED7AA" font-size="8" font-family="monospace">GPT-4o</text>

    <!-- Content (left) -->
    <g transform="translate(60, 90)">
        <rect x="0" y="0" width="170" height="32" rx="16" fill="rgba(249,115,22,0.12)" stroke="rgba(249,115,22,0.35)" stroke-width="1" />
        <circle cx="16" cy="16" r="6" fill="#F97316" />
        <text x="32" y="21" fill="#FDBA74" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" letter-spacing="1">FULLSTACK TRACK</text>

        <text x="0" y="95" fill="#ffffff" font-size="38" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">Java + AI</text>
        <text x="0" y="148" fill="#FDBA74" font-size="38" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">Fullstack Dev</text>
        <text x="0" y="195" fill="rgba(255,255,255,0.65)" font-size="18" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="400">Spring Boot, React &amp; AI APIs</text>

        <rect x="0" y="218" width="54" height="28" rx="14" fill="rgba(249,115,22,0.15)" stroke="rgba(249,115,22,0.4)" stroke-width="1"/>
        <text x="27" y="237" text-anchor="middle" fill="#FDBA74" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">Java</text>
        <rect x="66" y="218" width="90" height="28" rx="14" fill="rgba(249,115,22,0.15)" stroke="rgba(249,115,22,0.4)" stroke-width="1"/>
        <text x="111" y="237" text-anchor="middle" fill="#FDBA74" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">Spring Boot</text>
        <rect x="168" y="218" width="56" height="28" rx="14" fill="rgba(249,115,22,0.15)" stroke="rgba(249,115,22,0.4)" stroke-width="1"/>
        <text x="196" y="237" text-anchor="middle" fill="#FDBA74" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">React</text>

        <rect x="0" y="260" width="150" height="44" rx="10" fill="url(#javafsGrad)" opacity="0.9" filter="url(#javafsGlow)"/>
        <text x="75" y="288" fill="#ffffff" font-size="16" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" text-anchor="middle">Enroll Now →</text>
