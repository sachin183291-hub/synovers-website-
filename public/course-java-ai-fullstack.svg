<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="javafsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FF6B35" />
            <stop offset="100%" stop-color="#F97316" />
        </linearGradient>
        <pattern id="javafsGrid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
            <circle cx="40" cy="40" r="1.5" fill="rgba(255,255,255,0.15)"/>
        </pattern>
        <filter id="javafsSoftGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="80" />
        </filter>
        <filter id="javafsGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <rect width="800" height="450" fill="#0F172A" />
    <circle cx="70" cy="70" r="270" fill="#C2410C" opacity="0.22" filter="url(#javafsSoftGlow)" />
    <circle cx="760" cy="390" r="260" fill="#F97316" opacity="0.2" filter="url(#javafsSoftGlow)" />
    <rect width="800" height="450" fill="url(#javafsGrid)" />

    <!-- Spring Boot / Java architecture visualization -->
    <!-- IDE-like code editor -->
    <rect x="455" y="75" width="320" height="295" rx="12" fill="#0A0F1A" stroke="#F97316" stroke-width="1.5" opacity="0.95"/>
    <!-- Editor header tabs -->
    <rect x="455" y="75" width="320" height="28" rx="12" fill="#111827" opacity="0.95"/>
    <rect x="455" y="90" width="320" height="13" fill="#111827"/>
    <rect x="462" y="79" width="80" height="20" rx="4" fill="#F97316" opacity="0.2" stroke="#F97316" stroke-width="1"/>
    <text x="502" y="93" text-anchor="middle" fill="#FDBA74" font-size="10" font-family="monospace">Application.java</text>
    <rect x="546" y="79" width="70" height="20" rx="4" fill="#111827" opacity="0.8"/>
    <text x="581" y="93" text-anchor="middle" fill="#6B7280" font-size="10" font-family="monospace">Controller.java</text>

    <!-- Line numbers + code -->
    <rect x="455" y="103" width="28" height="267" fill="#0D111A" opacity="0.7"/>
    <text x="469" y="122" text-anchor="middle" fill="#4B5563" font-size="9" font-family="monospace">1</text>
    <text x="469" y="137" text-anchor="middle" fill="#4B5563" font-size="9" font-family="monospace">2</text>
    <text x="469" y="152" text-anchor="middle" fill="#4B5563" font-size="9" font-family="monospace">3</text>
    <text x="469" y="167" text-anchor="middle" fill="#4B5563" font-size="9" font-family="monospace">4</text>
    <text x="469" y="182" text-anchor="middle" fill="#4B5563" font-size="9" font-family="monospace">5</text>
    <text x="469" y="197" text-anchor="middle" fill="#4B5563" font-size="9" font-family="monospace">6</text>
    <text x="469" y="212" text-anchor="middle" fill="#4B5563" font-size="9" font-family="monospace">7</text>
    <text x="469" y="227" text-anchor="middle" fill="#4B5563" font-size="9" font-family="monospace">8</text>
    <text x="469" y="242" text-anchor="middle" fill="#4B5563" font-size="9" font-family="monospace">9</text>
    <!-- Code lines -->
    <text x="490" y="122" fill="#FDBA74" font-size="10" font-family="monospace">@SpringBootApplication</text>
    <text x="490" y="137" fill="#F97316" font-size="10" font-family="monospace">public class App {'{'}</text>
    <text x="490" y="152" fill="#FED7AA" font-size="10" font-family="monospace">  public static void</text>
    <text x="490" y="167" fill="#FED7AA" font-size="10" font-family="monospace">  main(String[] a) {'{'}</text>
    <text x="490" y="182" fill="#FDBA74" font-size="10" font-family="monospace">    SpringApplication</text>
    <text x="490" y="197" fill="#FDBA74" font-size="10" font-family="monospace">    .run(App.class, a);</text>
    <text x="490" y="212" fill="#F97316" font-size="10" font-family="monospace">  {'}'}</text>
    <text x="490" y="227" fill="#F97316" font-size="10" font-family="monospace">{'}'}</text>
    <!-- highlight line -->
    <rect x="483" y="175" width="285" height="15" fill="#F97316" opacity="0.08"/>

    <!-- Spring Boot annotation badges -->
    <rect x="462" y="252" width="290" height="30" rx="6" fill="#111827" opacity="0.8"/>
    <rect x="468" y="258" width="72" height="18" rx="4" fill="#7C2D12" opacity="0.8"/>
    <text x="504" y="271" text-anchor="middle" fill="#FDBA74" font-size="9" font-family="monospace">@RestController</text>
    <rect x="546" y="258" width="64" height="18" rx="4" fill="#7C2D12" opacity="0.7"/>
