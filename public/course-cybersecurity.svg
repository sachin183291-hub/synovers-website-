<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#EF4444" />
            <stop offset="100%" stop-color="#F87171" />
        </linearGradient>
        <pattern id="cyberGrid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
            <circle cx="40" cy="40" r="1.5" fill="rgba(255,255,255,0.15)"/>
        </pattern>
        <filter id="cyberSoftGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="80" />
        </filter>
        <filter id="cyberGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <rect width="800" height="450" fill="#0F172A" />
    <circle cx="80" cy="80" r="270" fill="#B91C1C" opacity="0.22" filter="url(#cyberSoftGlow)" />
    <circle cx="760" cy="390" r="260" fill="#EF4444" opacity="0.18" filter="url(#cyberSoftGlow)" />
    <rect width="800" height="450" fill="url(#cyberGrid)" />

    <!-- Shield with lock (right side) -->
    <!-- Shield body -->
    <path d="M630 80 L730 80 L730 210 Q730 270 630 310 Q530 270 530 210 L530 80 Z" fill="#1A0A0A" stroke="#EF4444" stroke-width="2" opacity="0.9"/>
    <path d="M630 100 L715 100 L715 210 Q715 258 630 294 Q545 258 545 210 L545 100 Z" fill="#0F0505" opacity="0.7"/>
    <!-- Lock icon inside shield -->
    <rect x="606" y="175" width="48" height="40" rx="6" fill="#1E0808" stroke="#EF4444" stroke-width="1.5" opacity="0.9"/>
    <path d="M615 175 Q615 155 630 155 Q645 155 645 175" fill="none" stroke="#EF4444" stroke-width="2.5" opacity="0.9"/>
    <circle cx="630" cy="196" r="7" fill="#EF4444" opacity="0.8"/>
    <line x1="630" y1="203" x2="630" y2="210" stroke="#EF4444" stroke-width="2" opacity="0.8"/>
    <!-- Shield glow ring -->
    <path d="M630 80 L730 80 L730 210 Q730 270 630 310 Q530 270 530 210 L530 80 Z" fill="none" stroke="#F87171" stroke-width="0.5" opacity="0.4"/>
    <!-- Check mark on shield -->
    <text x="630" y="145" text-anchor="middle" fill="#EF4444" font-size="14" font-family="monospace" font-weight="700" opacity="0.5">SECURED</text>

    <!-- Network nodes around shield -->
    <circle cx="470" cy="150" r="12" fill="#1A0808" stroke="#EF4444" stroke-width="1.5" opacity="0.8"/>
    <circle cx="790" cy="160" r="12" fill="#1A0808" stroke="#EF4444" stroke-width="1.5" opacity="0.8"/>
    <circle cx="480" cy="280" r="12" fill="#1A0808" stroke="#22C55E" stroke-width="1.5" opacity="0.7"/>
    <circle cx="785" cy="290" r="12" fill="#1A0808" stroke="#22C55E" stroke-width="1.5" opacity="0.7"/>

    <!-- Network attack lines (red = threats blocked) -->
    <line x1="470" y1="150" x2="530" y2="175" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
    <line x1="790" y1="160" x2="730" y2="175" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
    <!-- X marks at shield -->
    <text x="540" y="172" fill="#EF4444" font-size="12" font-family="monospace" opacity="0.7">✗</text>
    <text x="716" y="172" fill="#EF4444" font-size="12" font-family="monospace" opacity="0.7">✗</text>
    <!-- Safe green lines -->
    <line x1="480" y1="280" x2="530" y2="250" stroke="#22C55E" stroke-width="1.5" opacity="0.4"/>
    <line x1="785" y1="290" x2="730" y2="250" stroke="#22C55E" stroke-width="1.5" opacity="0.4"/>

    <!-- Terminal output at bottom right -->
    <rect x="490" y="330" width="290" height="90" rx="8" fill="#0A0505" stroke="#EF4444" stroke-width="1" opacity="0.85"/>
    <text x="502" y="350" fill="#EF4444" font-size="10" font-family="monospace" opacity="0.8">root@kali:~# nmap -sV target</text>
    <text x="502" y="366" fill="#F87171" font-size="10" font-family="monospace" opacity="0.65">PORT   STATE SERVICE</text>
    <text x="502" y="381" fill="#22C55E" font-size="10" font-family="monospace" opacity="0.7">80/tcp open  http</text>
    <text x="502" y="396" fill="#22C55E" font-size="10" font-family="monospace" opacity="0.65">443/tcp open  https</text>
    <text x="502" y="411" fill="#F59E0B" font-size="10" font-family="monospace" opacity="0.6">Nmap done: 1 IP scanned</text>

    <!-- Content (left) -->
    <g transform="translate(60, 90)">
        <rect x="0" y="0" width="165" height="32" rx="16" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.35)" stroke-width="1" />
        <circle cx="16" cy="16" r="6" fill="#EF4444" />
        <text x="32" y="21" fill="#F87171" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" letter-spacing="1">SECURITY TRACK</text>

        <text x="0" y="95" fill="#ffffff" font-size="40" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">Cybersecurity</text>
        <text x="0" y="148" fill="#F87171" font-size="40" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">&amp; Ethical Hacking</text>
        <text x="0" y="195" fill="rgba(255,255,255,0.65)" font-size="18" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="400">Pen Testing &amp; Network Security</text>

        <rect x="0" y="218" width="76" height="28" rx="14" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
        <text x="38" y="237" text-anchor="middle" fill="#F87171" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">Kali Linux</text>
        <rect x="88" y="218" width="82" height="28" rx="14" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
        <text x="129" y="237" text-anchor="middle" fill="#F87171" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">Pen Testing</text>
        <rect x="182" y="218" width="68" height="28" rx="14" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
        <text x="216" y="237" text-anchor="middle" fill="#F87171" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">OWASP</text>

        <rect x="0" y="260" width="150" height="44" rx="10" fill="url(#cyberGrad)" opacity="0.9" filter="url(#cyberGlow)"/>
        <text x="75" y="288" fill="#ffffff" font-size="16" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" text-anchor="middle">Enroll Now →</text>
    </g>
</svg>