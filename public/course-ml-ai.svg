<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="mlGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#8B5CF6" />
            <stop offset="100%" stop-color="#C084FC" />
        </linearGradient>
        <pattern id="mlGrid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
            <circle cx="40" cy="40" r="1.5" fill="rgba(255,255,255,0.15)"/>
        </pattern>
        <filter id="mlSoftGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="80" />
        </filter>
        <filter id="mlGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <rect width="800" height="450" fill="#0F172A" />
    <circle cx="60" cy="60" r="280" fill="#7C3AED" opacity="0.22" filter="url(#mlSoftGlow)" />
    <circle cx="780" cy="420" r="280" fill="#A855F7" opacity="0.2" filter="url(#mlSoftGlow)" />
    <rect width="800" height="450" fill="url(#mlGrid)" />

    <!-- Neural Network visualization (right side) -->
    <!-- Layer 1 - Input nodes -->
    <circle cx="490" cy="120" r="18" fill="#1E293B" stroke="#8B5CF6" stroke-width="2"/>
    <circle cx="490" cy="180" r="18" fill="#1E293B" stroke="#8B5CF6" stroke-width="2"/>
    <circle cx="490" cy="240" r="18" fill="#1E293B" stroke="#8B5CF6" stroke-width="2"/>
    <circle cx="490" cy="300" r="18" fill="#1E293B" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Layer 2 - Hidden nodes -->
    <circle cx="600" cy="140" r="20" fill="#7C3AED" opacity="0.85" stroke="#C084FC" stroke-width="1.5"/>
    <circle cx="600" cy="200" r="20" fill="#7C3AED" opacity="0.85" stroke="#C084FC" stroke-width="1.5"/>
    <circle cx="600" cy="260" r="20" fill="#7C3AED" opacity="0.85" stroke="#C084FC" stroke-width="1.5"/>
    <circle cx="600" cy="320" r="20" fill="#7C3AED" opacity="0.85" stroke="#C084FC" stroke-width="1.5"/>
    <!-- Layer 3 - Hidden nodes -->
    <circle cx="700" cy="160" r="20" fill="#6D28D9" opacity="0.9" stroke="#A78BFA" stroke-width="1.5"/>
    <circle cx="700" cy="230" r="20" fill="#6D28D9" opacity="0.9" stroke="#A78BFA" stroke-width="1.5"/>
    <circle cx="700" cy="300" r="20" fill="#6D28D9" opacity="0.9" stroke="#A78BFA" stroke-width="1.5"/>
    <!-- Layer 4 - Output -->
    <circle cx="770" cy="195" r="22" fill="#8B5CF6" opacity="0.95" stroke="#C084FC" stroke-width="2"/>
    <circle cx="770" cy="265" r="22" fill="#8B5CF6" opacity="0.95" stroke="#C084FC" stroke-width="2"/>

    <!-- Connections L1->L2 -->
    <line x1="508" y1="120" x2="580" y2="140" stroke="#8B5CF6" stroke-width="1" opacity="0.3"/>
    <line x1="508" y1="120" x2="580" y2="200" stroke="#8B5CF6" stroke-width="1" opacity="0.2"/>
    <line x1="508" y1="120" x2="580" y2="260" stroke="#8B5CF6" stroke-width="1" opacity="0.15"/>
    <line x1="508" y1="180" x2="580" y2="140" stroke="#8B5CF6" stroke-width="1" opacity="0.25"/>
    <line x1="508" y1="180" x2="580" y2="200" stroke="#C084FC" stroke-width="1.5" opacity="0.45"/>
    <line x1="508" y1="180" x2="580" y2="260" stroke="#8B5CF6" stroke-width="1" opacity="0.2"/>
    <line x1="508" y1="240" x2="580" y2="200" stroke="#8B5CF6" stroke-width="1" opacity="0.3"/>
    <line x1="508" y1="240" x2="580" y2="260" stroke="#C084FC" stroke-width="1.5" opacity="0.4"/>
    <line x1="508" y1="240" x2="580" y2="320" stroke="#8B5CF6" stroke-width="1" opacity="0.2"/>
    <line x1="508" y1="300" x2="580" y2="260" stroke="#8B5CF6" stroke-width="1" opacity="0.2"/>
    <line x1="508" y1="300" x2="580" y2="320" stroke="#8B5CF6" stroke-width="1" opacity="0.3"/>
    <!-- Connections L2->L3 -->
    <line x1="620" y1="140" x2="680" y2="160" stroke="#A78BFA" stroke-width="1" opacity="0.3"/>
    <line x1="620" y1="140" x2="680" y2="230" stroke="#A78BFA" stroke-width="1" opacity="0.2"/>
    <line x1="620" y1="200" x2="680" y2="160" stroke="#C084FC" stroke-width="1.5" opacity="0.4"/>
    <line x1="620" y1="200" x2="680" y2="230" stroke="#C084FC" stroke-width="1.5" opacity="0.45"/>
    <line x1="620" y1="260" x2="680" y2="230" stroke="#A78BFA" stroke-width="1" opacity="0.3"/>
    <line x1="620" y1="260" x2="680" y2="300" stroke="#A78BFA" stroke-width="1" opacity="0.3"/>
    <line x1="620" y1="320" x2="680" y2="300" stroke="#A78BFA" stroke-width="1" opacity="0.25"/>
    <!-- Connections L3->L4 -->
    <line x1="720" y1="160" x2="748" y2="195" stroke="#C084FC" stroke-width="1.5" opacity="0.5"/>
    <line x1="720" y1="230" x2="748" y2="195" stroke="#C084FC" stroke-width="1.5" opacity="0.5"/>
    <line x1="720" y1="230" x2="748" y2="265" stroke="#C084FC" stroke-width="1.5" opacity="0.5"/>
    <line x1="720" y1="300" x2="748" y2="265" stroke="#C084FC" stroke-width="1.5" opacity="0.45"/>

    <!-- Layer labels -->
    <text x="490" y="352" text-anchor="middle" fill="#A78BFA" font-size="10" font-family="monospace" opacity="0.6">Input</text>
    <text x="600" y="352" text-anchor="middle" fill="#A78BFA" font-size="10" font-family="monospace" opacity="0.6">Hidden</text>
    <text x="700" y="352" text-anchor="middle" fill="#A78BFA" font-size="10" font-family="monospace" opacity="0.6">Hidden</text>
    <text x="770" y="307" text-anchor="middle" fill="#A78BFA" font-size="10" font-family="monospace" opacity="0.6">Out</text>

    <!-- Content (left) -->
    <g transform="translate(60, 90)">
        <rect x="0" y="0" width="140" height="32" rx="16" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.35)" stroke-width="1" />
        <circle cx="16" cy="16" r="6" fill="#8B5CF6" />
        <text x="32" y="21" fill="#C084FC" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" letter-spacing="1">AI &amp; ML TRACK</text>

        <text x="0" y="95" fill="#ffffff" font-size="44" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">Machine</text>
        <text x="0" y="148" fill="#C084FC" font-size="44" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">Learning &amp; AI</text>
        <text x="0" y="195" fill="rgba(255,255,255,0.65)" font-size="19" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="400">Deep Learning &amp; MLOps</text>

        <rect x="0" y="218" width="90" height="28" rx="14" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.4)" stroke-width="1"/>
        <text x="45" y="237" text-anchor="middle" fill="#C084FC" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">TensorFlow</text>
        <rect x="102" y="218" width="68" height="28" rx="14" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.4)" stroke-width="1"/>
        <text x="136" y="237" text-anchor="middle" fill="#C084FC" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">PyTorch</text>
        <rect x="182" y="218" width="60" height="28" rx="14" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.4)" stroke-width="1"/>
        <text x="212" y="237" text-anchor="middle" fill="#C084FC" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">MLOps</text>

        <rect x="0" y="260" width="150" height="44" rx="10" fill="url(#mlGrad)" opacity="0.9" filter="url(#mlGlow)"/>
        <text x="75" y="288" fill="#ffffff" font-size="16" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" text-anchor="middle">Enroll Now →</text>
    </g>
</svg>