<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="uiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#EC4899" />
            <stop offset="100%" stop-color="#F472B6" />
        </linearGradient>
        <pattern id="uiGrid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
            <circle cx="40" cy="40" r="1.5" fill="rgba(255,255,255,0.15)"/>
        </pattern>
        <filter id="uiSoftGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="80" />
        </filter>
        <filter id="uiGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <rect width="800" height="450" fill="#0F172A" />
    <circle cx="70" cy="70" r="270" fill="#9D174D" opacity="0.22" filter="url(#uiSoftGlow)" />
    <circle cx="760" cy="390" r="260" fill="#EC4899" opacity="0.18" filter="url(#uiSoftGlow)" />
    <rect width="800" height="450" fill="url(#uiGrid)" />

    <!-- Figma/Design tool visualization (right side) -->
    <!-- Figma-like canvas -->
    <rect x="455" y="75" width="325" height="300" rx="12" fill="#0D0A12" stroke="#EC4899" stroke-width="1.5" opacity="0.95"/>
    <!-- Tool header -->
    <rect x="455" y="75" width="325" height="28" rx="12" fill="#18101E" opacity="0.95"/>
    <rect x="455" y="91" width="325" height="12" fill="#18101E"/>
    <!-- Figma-like menus -->
    <text x="470" y="93" fill="#EC4899" font-size="13" font-family="monospace" font-weight="700" opacity="0.9">F</text>
    <text x="490" y="93" fill="#F9A8D4" font-size="10" font-family="monospace" opacity="0.7">File   Edit   View   Object</text>
    <!-- Tools panel left -->
    <rect x="455" y="103" width="28" height="272" fill="#100C16" opacity="0.8"/>
    <!-- Tool icons -->
    <rect x="461" y="112" width="16" height="16" rx="3" fill="#EC4899" opacity="0.4"/>
    <rect x="461" y="132" width="16" height="16" rx="8" fill="#EC4899" opacity="0.3"/>
    <path d="M461 156 L477 156 L477 172 L461 172 Z" fill="none" stroke="#EC4899" stroke-width="1.5" opacity="0.4"/>
    <line x1="464" y1="180" x2="474" y2="190" stroke="#EC4899" stroke-width="2" opacity="0.4"/>

    <!-- Main design canvas area -->
    <!-- Phone mockup in center -->
    <rect x="560" y="112" width="100" height="186" rx="16" fill="#1A0E20" stroke="#EC4899" stroke-width="1.5" opacity="0.9"/>
    <rect x="568" y="120" width="84" height="170" rx="10" fill="#0D0912" opacity="0.8"/>
    <!-- Phone content: app UI -->
    <!-- Status bar -->
    <rect x="568" y="120" width="84" height="12" rx="4" fill="#18101E" opacity="0.8"/>
    <!-- Nav bar of app -->
    <rect x="568" y="136" width="84" height="20" rx="2" fill="#EC4899" opacity="0.25"/>
    <text x="610" y="150" text-anchor="middle" fill="#F9A8D4" font-size="9" font-family="monospace">Home</text>
    <!-- Hero card in app -->
    <rect x="572" y="160" width="76" height="40" rx="6" fill="#EC4899" opacity="0.2" stroke="#EC4899" stroke-width="1"/>
    <rect x="576" y="164" width="40" height="14" rx="2" fill="#EC4899" opacity="0.4"/>
    <rect x="576" y="181" width="65" height="6" rx="1" fill="#6B21A8" opacity="0.4"/>
    <rect x="576" y="190" width="50" height="6" rx="1" fill="#6B21A8" opacity="0.3"/>
    <!-- Cards row -->
    <rect x="572" y="208" width="34" height="30" rx="4" fill="#1A0E20" stroke="#EC4899" stroke-width="1" opacity="0.8"/>
    <rect x="610" y="208" width="34" height="30" rx="4" fill="#1A0E20" stroke="#EC4899" stroke-width="1" opacity="0.8"/>
    <!-- Bottom nav -->
    <rect x="568" y="276" width="84" height="14" rx="2" fill="#18101E" opacity="0.8"/>
    <circle cx="582" cy="283" r="4" fill="#EC4899" opacity="0.6"/>
    <circle cx="598" cy="283" r="4" fill="#6B21A8" opacity="0.4"/>
    <circle cx="614" cy="283" r="4" fill="#6B21A8" opacity="0.4"/>
    <circle cx="630" cy="283" r="4" fill="#6B21A8" opacity="0.4"/>

    <!-- Color palette right side -->
    <rect x="680" y="115" width="90" height="175" rx="8" fill="#100C16" stroke="#EC4899" stroke-width="1" opacity="0.9"/>
    <text x="725" y="132" text-anchor="middle" fill="#F9A8D4" font-size="10" font-family="monospace" opacity="0.8">Color Styles</text>
    <circle cx="695" cy="150" r="10" fill="#EC4899" opacity="0.9"/>
    <circle cx="720" cy="150" r="10" fill="#A855F7" opacity="0.9"/>
    <circle cx="745" cy="150" r="10" fill="#8B5CF6" opacity="0.9"/>
    <circle cx="695" cy="175" r="10" fill="#F472B6" opacity="0.9"/>
    <circle cx="720" cy="175" r="10" fill="#FCA5A5" opacity="0.9"/>
    <circle cx="745" cy="175" r="10" fill="#FBCFE8" opacity="0.9"/>
    <!-- Typography -->
    <text x="725" y="205" text-anchor="middle" fill="#F9A8D4" font-size="10" font-family="monospace" opacity="0.7">Typography</text>
    <text x="690" y="222" fill="#ffffff" font-size="14" font-family="Segoe UI, sans-serif" font-weight="700" opacity="0.8">Aa</text>
    <text x="716" y="222" fill="#F9A8D4" font-size="12" font-family="Segoe UI, sans-serif" font-weight="400" opacity="0.7">Bb</text>
    <text x="738" y="222" fill="#C084FC" font-size="10" font-family="monospace" opacity="0.6">Cc</text>
    <!-- Spacing guide -->
    <text x="725" y="242" text-anchor="middle" fill="#F9A8D4" font-size="10" font-family="monospace" opacity="0.7">Spacing</text>
    <rect x="688" y="248" width="4" height="24" rx="1" fill="#EC4899" opacity="0.7"/>
    <rect x="696" y="252" width="8" height="16" rx="1" fill="#EC4899" opacity="0.5"/>
    <rect x="708" y="256" width="12" height="8" rx="1" fill="#EC4899" opacity="0.4"/>
    <rect x="724" y="248" width="16" height="24" rx="1" fill="#A855F7" opacity="0.5"/>
    <rect x="744" y="248" width="24" height="24" rx="1" fill="#A855F7" opacity="0.35"/>

    <!-- Layer panel bottom -->
    <rect x="483" y="306" width="164" height="55" rx="6" fill="#100C16" stroke="#EC4899" stroke-width="1" opacity="0.85"/>
    <text x="493" y="320" fill="#F9A8D4" font-size="9" font-family="monospace" opacity="0.7">Layers</text>
    <text x="493" y="335" fill="#EC4899" font-size="9" font-family="monospace" opacity="0.8">▤ Nav Bar</text>
    <text x="493" y="348" fill="#C084FC" font-size="9" font-family="monospace" opacity="0.7">▤ Hero Card</text>
    <text x="493" y="361" fill="#C084FC" font-size="9" font-family="monospace" opacity="0.65">▤ Product Grid</text>

    <!-- Content (left) -->
    <g transform="translate(60, 90)">
        <rect x="0" y="0" width="150" height="32" rx="16" fill="rgba(236,72,153,0.12)" stroke="rgba(236,72,153,0.35)" stroke-width="1" />
        <circle cx="16" cy="16" r="6" fill="#EC4899" />
        <text x="32" y="21" fill="#F9A8D4" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" letter-spacing="1">DESIGN TRACK</text>

        <text x="0" y="95" fill="#ffffff" font-size="44" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">UI/UX</text>
        <text x="0" y="148" fill="#F9A8D4" font-size="44" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">Design Pro</text>
        <text x="0" y="195" fill="rgba(255,255,255,0.65)" font-size="18" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="400">Figma, Prototyping &amp; UX Research</text>

        <rect x="0" y="218" width="58" height="28" rx="14" fill="rgba(236,72,153,0.15)" stroke="rgba(236,72,153,0.4)" stroke-width="1"/>
        <text x="29" y="237" text-anchor="middle" fill="#F9A8D4" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">Figma</text>
        <rect x="70" y="218" width="78" height="28" rx="14" fill="rgba(236,72,153,0.15)" stroke="rgba(236,72,153,0.4)" stroke-width="1"/>
        <text x="109" y="237" text-anchor="middle" fill="#F9A8D4" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">Adobe XD</text>
        <rect x="160" y="218" width="82" height="28" rx="14" fill="rgba(236,72,153,0.15)" stroke="rgba(236,72,153,0.4)" stroke-width="1"/>
        <text x="201" y="237" text-anchor="middle" fill="#F9A8D4" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">UX Research</text>

        <rect x="0" y="260" width="150" height="44" rx="10" fill="url(#uiGrad)" opacity="0.9" filter="url(#uiGlow)"/>
        <text x="75" y="288" fill="#ffffff" font-size="16" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" text-anchor="middle">Enroll Now →</text>
    </g>
</svg>