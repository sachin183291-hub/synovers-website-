<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="plcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#06B6D4" />
            <stop offset="100%" stop-color="#0EA5E9" />
        </linearGradient>
        <pattern id="plcGrid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
            <circle cx="40" cy="40" r="1.5" fill="rgba(255,255,255,0.15)"/>
        </pattern>
        <filter id="plcSoftGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="80" />
        </filter>
        <filter id="plcGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- Base Background -->
    <rect width="800" height="450" fill="#0F172A" />

    <!-- Giant Glowing Orbs -->
    <circle cx="80" cy="80" r="260" fill="#0891B2" opacity="0.25" filter="url(#plcSoftGlow)" />
    <circle cx="750" cy="400" r="270" fill="#0EA5E9" opacity="0.2" filter="url(#plcSoftGlow)" />

    <!-- Grid Overlay -->
    <rect width="800" height="450" fill="url(#plcGrid)" />

    <!-- PLC Unit visual (right side) -->
    <!-- Main PLC chassis -->
    <rect x="460" y="80" width="290" height="290" rx="12" fill="#1A2535" stroke="#06B6D4" stroke-width="2" opacity="0.95"/>
    <!-- Top rail -->
    <rect x="460" y="80" width="290" height="22" rx="12" fill="#1E3A4A" stroke="#06B6D4" stroke-width="1.5" opacity="0.9"/>
    <!-- PLC module 1 - Power Supply -->
    <rect x="472" y="114" width="60" height="225" rx="6" fill="#0F2035" stroke="#06B6D4" stroke-width="1" opacity="0.9"/>
    <rect x="479" y="122" width="46" height="20" rx="3" fill="#06B6D4" opacity="0.3"/>
    <text x="502" y="136" text-anchor="middle" fill="#67E8F9" font-size="9" font-family="monospace" opacity="0.9">PWR</text>
    <circle cx="502" cy="165" r="6" fill="#22C55E" opacity="0.8"/>
    <circle cx="502" cy="185" r="6" fill="#EF4444" opacity="0.6"/>
    <!-- PLC module 2 - CPU -->
    <rect x="540" y="114" width="70" height="225" rx="6" fill="#0F2035" stroke="#0EA5E9" stroke-width="1" opacity="0.9"/>
    <rect x="547" y="122" width="56" height="20" rx="3" fill="#0EA5E9" opacity="0.3"/>
    <text x="575" y="136" text-anchor="middle" fill="#7DD3FC" font-size="9" font-family="monospace" opacity="0.9">CPU</text>
    <!-- Display screen -->
    <rect x="548" y="155" width="54" height="36" rx="3" fill="#001020" stroke="#0EA5E9" stroke-width="1" opacity="0.9"/>
    <text x="575" y="170" text-anchor="middle" fill="#06B6D4" font-size="8" font-family="monospace" opacity="0.8">RUN</text>
    <text x="575" y="183" text-anchor="middle" fill="#22C55E" font-size="8" font-family="monospace" opacity="0.8">OK</text>
    <!-- Blinking LED -->
    <circle cx="562" cy="205" r="5" fill="#22C55E" opacity="0.9"/>
    <circle cx="578" cy="205" r="5" fill="#F59E0B" opacity="0.7"/>
    <circle cx="594" cy="205" r="5" fill="#EF4444" opacity="0.5"/>
    <!-- PLC module 3 - I/O -->
    <rect x="618" y="114" width="60" height="225" rx="6" fill="#0F2035" stroke="#06B6D4" stroke-width="1" opacity="0.9"/>
    <rect x="625" y="122" width="46" height="20" rx="3" fill="#06B6D4" opacity="0.3"/>
    <text x="648" y="136" text-anchor="middle" fill="#67E8F9" font-size="9" font-family="monospace" opacity="0.9">I/O</text>
    <!-- IO channels -->
    <rect x="626" y="152" width="44" height="6" rx="2" fill="#06B6D4" opacity="0.5"/>
    <rect x="626" y="162" width="44" height="6" rx="2" fill="#22C55E" opacity="0.5"/>
    <rect x="626" y="172" width="44" height="6" rx="2" fill="#06B6D4" opacity="0.4"/>
    <rect x="626" y="182" width="44" height="6" rx="2" fill="#22C55E" opacity="0.4"/>
    <rect x="626" y="192" width="44" height="6" rx="2" fill="#EF4444" opacity="0.4"/>
    <!-- PLC module 4 - Comm -->
    <rect x="686" y="114" width="52" height="225" rx="6" fill="#0F2035" stroke="#0EA5E9" stroke-width="1" opacity="0.8"/>
    <rect x="693" y="122" width="38" height="20" rx="3" fill="#0EA5E9" opacity="0.25"/>
    <text x="712" y="136" text-anchor="middle" fill="#7DD3FC" font-size="8" font-family="monospace" opacity="0.9">COMM</text>
    <!-- Connector terminals at bottom -->
    <rect x="472" y="316" width="256" height="30" rx="4" fill="#1A3040" stroke="#06B6D4" stroke-width="1" opacity="0.8"/>
    <rect x="478" y="322" width="12" height="18" rx="2" fill="#06B6D4" opacity="0.4"/>
    <rect x="494" y="322" width="12" height="18" rx="2" fill="#06B6D4" opacity="0.4"/>
    <rect x="510" y="322" width="12" height="18" rx="2" fill="#22C55E" opacity="0.4"/>
    <rect x="526" y="322" width="12" height="18" rx="2" fill="#22C55E" opacity="0.4"/>
    <rect x="542" y="322" width="12" height="18" rx="2" fill="#06B6D4" opacity="0.3"/>
    <rect x="558" y="322" width="12" height="18" rx="2" fill="#06B6D4" opacity="0.3"/>

    <!-- SCADA screen icon (floating) -->
    <rect x="350" y="160" width="90" height="60" rx="6" fill="#1E293B" stroke="#06B6D4" stroke-width="1" opacity="0.75"/>
    <rect x="357" y="167" width="76" height="46" rx="3" fill="#001825" opacity="0.7"/>
    <!-- Mini trend line -->
    <polyline points="362,202 372,192 382,198 392,185 402,190 412,178 422,185" stroke="#06B6D4" stroke-width="1.5" fill="none" opacity="0.8"/>
    <line x1="457" y1="190" x2="463" y2="190" stroke="#06B6D4" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>

    <!-- Content (left) -->
    <g transform="translate(60, 90)">
        <!-- Top Tech Pill -->
        <rect x="0" y="0" width="155" height="32" rx="16" fill="rgba(6,182,212,0.12)" stroke="rgba(6,182,212,0.35)" stroke-width="1" />
        <circle cx="16" cy="16" r="6" fill="#06B6D4" />
        <text x="32" y="21" fill="#06B6D4" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" letter-spacing="1">HARDWARE TRACK</text>

        <!-- Main Title -->
        <text x="0" y="95" fill="#ffffff" font-size="38" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">Industrial IoT</text>
        <text x="0" y="148" fill="#06B6D4" font-size="38" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">&amp; PLC Automation</text>

        <!-- Subtitle -->
        <text x="0" y="195" fill="rgba(255,255,255,0.65)" font-size="19" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="400">SCADA, IIoT &amp; Manufacturing</text>

        <!-- Tags row -->
        <rect x="0" y="218" width="48" height="28" rx="14" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.4)" stroke-width="1"/>
        <text x="24" y="237" text-anchor="middle" fill="#06B6D4" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">PLC</text>

        <rect x="60" y="218" width="74" height="28" rx="14" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.4)" stroke-width="1"/>
        <text x="97" y="237" text-anchor="middle" fill="#06B6D4" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">SCADA</text>

        <rect x="146" y="218" width="68" height="28" rx="14" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.4)" stroke-width="1"/>
        <text x="180" y="237" text-anchor="middle" fill="#06B6D4" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">Modbus</text>

        <!-- CTA button -->
        <rect x="0" y="260" width="150" height="44" rx="10" fill="url(#plcGrad)" opacity="0.9" filter="url(#plcGlow)"/>
        <text x="75" y="288" fill="#ffffff" font-size="16" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" text-anchor="middle">Enroll Now →</text>
    </g>
</svg>