<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="pywebGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00D9B0" />
            <stop offset="100%" stop-color="#22D3EE" />
        </linearGradient>
        <pattern id="pywebGrid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
            <circle cx="40" cy="40" r="1.5" fill="rgba(255,255,255,0.15)"/>
        </pattern>
        <filter id="pywebSoftGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="80" />
        </filter>
        <filter id="pywebGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <rect width="800" height="450" fill="#0F172A" />
    <circle cx="70" cy="70" r="270" fill="#047857" opacity="0.22" filter="url(#pywebSoftGlow)" />
    <circle cx="760" cy="390" r="260" fill="#00D9B0" opacity="0.18" filter="url(#pywebSoftGlow)" />
    <rect width="800" height="450" fill="url(#pywebGrid)" />

    <!-- Web development visualization -->
    <!-- Browser window -->
    <rect x="455" y="75" width="320" height="310" rx="14" fill="#0A1A18" stroke="#00D9B0" stroke-width="1.5" opacity="0.95"/>
    <rect x="455" y="75" width="320" height="36" rx="14" fill="#0F2520" opacity="0.9"/>
    <rect x="455" y="96" width="320" height="15" fill="#0F2520"/>
    <circle cx="474" cy="93" r="5" fill="#EF4444" opacity="0.7"/>
    <circle cx="490" cy="93" r="5" fill="#F59E0B" opacity="0.7"/>
    <circle cx="506" cy="93" r="5" fill="#22C55E" opacity="0.7"/>
    <rect x="520" y="84" width="230" height="18" rx="7" fill="#071510" stroke="#00D9B0" stroke-width="1" opacity="0.8"/>
    <text x="635" y="97" text-anchor="middle" fill="#5EEAD4" font-size="9" font-family="monospace" opacity="0.8">https://webapp.com</text>

    <!-- Website UI inside browser -->
    <!-- Nav bar -->
    <rect x="463" y="118" width="304" height="30" rx="4" fill="#0F2520" opacity="0.9"/>
    <rect x="472" y="127" width="40" height="12" rx="3" fill="#00D9B0" opacity="0.7"/>
    <rect x="562" y="129" width="30" height="8" rx="2" fill="#5EEAD4" opacity="0.4"/>
    <rect x="598" y="129" width="30" height="8" rx="2" fill="#5EEAD4" opacity="0.4"/>
    <rect x="634" y="129" width="30" height="8" rx="2" fill="#5EEAD4" opacity="0.4"/>
    <rect x="728" y="124" width="30" height="16" rx="6" fill="#00D9B0" opacity="0.8"/>
    <text x="743" y="136" text-anchor="middle" fill="#0F172A" font-size="9" font-family="monospace" font-weight="700">Get</text>

    <!-- Hero section -->
    <rect x="463" y="152" width="304" height="90" rx="4" fill="#071510" opacity="0.8"/>
    <!-- gradient bg hint -->
    <rect x="463" y="152" width="150" height="90" fill="#00D9B0" opacity="0.04"/>
    <text x="475" y="175" fill="#ffffff" font-size="16" font-family="Segoe UI, sans-serif" font-weight="700" opacity="0.9">Build AI Web Apps</text>
    <text x="475" y="193" fill="#5EEAD4" font-size="11" font-family="Segoe UI, sans-serif" opacity="0.75">Python · Django · React</text>
    <text x="475" y="210" fill="rgba(255,255,255,0.5)" font-size="10" font-family="Segoe UI, sans-serif" opacity="0.8">Modern web with AI APIs</text>
    <rect x="475" y="222" width="60" height="16" rx="6" fill="#00D9B0" opacity="0.9"/>
    <text x="505" y="234" text-anchor="middle" fill="#0F172A" font-size="9" font-family="monospace" font-weight="700">Start →</text>
    <!-- hero image placeholder -->
    <rect x="630" y="157" width="125" height="80" rx="6" fill="#0F2520" opacity="0.7"/>
    <text x="692" y="203" text-anchor="middle" fill="#00D9B0" font-size="30" opacity="0.4">🐍</text>

    <!-- Card grid -->
    <rect x="463" y="247" width="95" height="70" rx="6" fill="#0D1E1A" stroke="#00D9B0" stroke-width="1" opacity="0.85"/>
    <text x="510" y="268" text-anchor="middle" fill="#5EEAD4" font-size="10" font-family="monospace" opacity="0.8">Django</text>
    <text x="510" y="283" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9" font-family="monospace">Backend</text>
    <text x="510" y="302" text-anchor="middle" fill="#00D9B0" font-size="18" opacity="0.5">⚙</text>

    <rect x="564" y="247" width="95" height="70" rx="6" fill="#0D1E1A" stroke="#22D3EE" stroke-width="1" opacity="0.85"/>
    <text x="611" y="268" text-anchor="middle" fill="#67E8F9" font-size="10" font-family="monospace" opacity="0.8">REST API</text>
    <text x="611" y="283" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9" font-family="monospace">OpenAI</text>
    <text x="611" y="302" text-anchor="middle" fill="#22D3EE" font-size="18" opacity="0.5">🔌</text>

    <rect x="665" y="247" width="95" height="70" rx="6" fill="#0D1E1A" stroke="#00D9B0" stroke-width="1" opacity="0.85"/>
    <text x="712" y="268" text-anchor="middle" fill="#5EEAD4" font-size="10" font-family="monospace" opacity="0.8">MongoDB</text>
    <text x="712" y="283" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9" font-family="monospace">Database</text>
    <text x="712" y="302" text-anchor="middle" fill="#00D9B0" font-size="18" opacity="0.5">🗄</text>

    <!-- Status bar at bottom -->
    <rect x="463" y="323" width="304" height="54" rx="4" fill="#071510" opacity="0.8"/>
    <text x="473" y="340" fill="#00D9B0" font-size="10" font-family="monospace" opacity="0.7">HTTP 200 OK  |  Response: 42ms</text>
    <text x="473" y="356" fill="#5EEAD4" font-size="10" font-family="monospace" opacity="0.65">{"{"}status: 'ok', ai_response: '...'{"}"}</text>
    <text x="473" y="370" fill="#5EEAD4" font-size="10" font-family="monospace" opacity="0.55">tokens_used: 312  model: gpt-4o</text>

    <!-- Content (left) -->
    <g transform="translate(60, 90)">
        <rect x="0" y="0" width="150" height="32" rx="16" fill="rgba(0,217,176,0.12)" stroke="rgba(0,217,176,0.35)" stroke-width="1" />
        <circle cx="16" cy="16" r="6" fill="#00D9B0" />
        <text x="32" y="21" fill="#5EEAD4" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" letter-spacing="1">WEB TRACK</text>

        <text x="0" y="95" fill="#ffffff" font-size="40" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">AI + Python</text>
        <text x="0" y="148" fill="#5EEAD4" font-size="40" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">Web Dev</text>
        <text x="0" y="195" fill="rgba(255,255,255,0.65)" font-size="19" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="400">Django, React &amp; AI APIs</text>

        <rect x="0" y="218" width="68" height="28" rx="14" fill="rgba(0,217,176,0.15)" stroke="rgba(0,217,176,0.4)" stroke-width="1"/>
        <text x="34" y="237" text-anchor="middle" fill="#5EEAD4" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">Django</text>
        <rect x="80" y="218" width="56" height="28" rx="14" fill="rgba(0,217,176,0.15)" stroke="rgba(0,217,176,0.4)" stroke-width="1"/>
        <text x="108" y="237" text-anchor="middle" fill="#5EEAD4" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">React</text>
        <rect x="148" y="218" width="52" height="28" rx="14" fill="rgba(0,217,176,0.15)" stroke="rgba(0,217,176,0.4)" stroke-width="1"/>
        <text x="174" y="237" text-anchor="middle" fill="#5EEAD4" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">API</text>

        <rect x="0" y="260" width="150" height="44" rx="10" fill="url(#pywebGrad)" opacity="0.9" filter="url(#pywebGlow)"/>
        <text x="75" y="288" fill="#0F172A" font-size="16" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" text-anchor="middle">Enroll Now →</text>
    </g>
</svg>