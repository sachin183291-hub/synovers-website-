<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FF6B35" />
            <stop offset="100%" stop-color="#FF8A65" />
        </linearGradient>
        <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FF8A65" />
            <stop offset="100%" stop-color="#FFAB91" />
        </linearGradient>
        <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
            <circle cx="40" cy="40" r="1.5" fill="rgba(255,255,255,0.15)"/>
        </pattern>
        <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="80" />
        </filter>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- Base Background -->
    <rect width="800" height="450" fill="#0F172A" />

    <!-- Giant Glowing Orbs -->
    <circle cx="100" cy="100" r="250" fill="#FF6B35" opacity="0.25" filter="url(#softGlow)" />
    <circle cx="750" cy="400" r="300" fill="#FF8A65" opacity="0.2" filter="url(#softGlow)" />

    <!-- Grid Overlay -->
    <rect width="800" height="450" fill="url(#gridPattern)" />

    <!-- Circuit board background pattern - lines -->
    <line x1="500" y1="20" x2="500" y2="430" stroke="rgba(255,107,53,0.08)" stroke-width="1"/>
    <line x1="600" y1="20" x2="600" y2="430" stroke="rgba(255,107,53,0.08)" stroke-width="1"/>
    <line x1="700" y1="20" x2="700" y2="430" stroke="rgba(255,107,53,0.08)" stroke-width="1"/>
    <line x1="470" y1="50" x2="790" y2="50" stroke="rgba(255,107,53,0.08)" stroke-width="1"/>
    <line x1="470" y1="150" x2="790" y2="150" stroke="rgba(255,107,53,0.08)" stroke-width="1"/>
    <line x1="470" y1="250" x2="790" y2="250" stroke="rgba(255,107,53,0.08)" stroke-width="1"/>
    <line x1="470" y1="350" x2="790" y2="350" stroke="rgba(255,107,53,0.08)" stroke-width="1"/>

    <!-- Microchip visual (right side) -->
    <!-- Main chip body -->
    <rect x="510" y="120" width="200" height="200" rx="16" fill="#1E293B" stroke="#FF6B35" stroke-width="2" opacity="0.9"/>
    <rect x="525" y="135" width="170" height="170" rx="10" fill="#0F172A" opacity="0.6"/>
    <!-- Chip core -->
    <rect x="560" y="170" width="100" height="100" rx="8" fill="#FF6B35" opacity="0.15"/>
    <rect x="570" y="180" width="80" height="80" rx="6" fill="#FF8A65" opacity="0.12"/>
    <!-- Core label -->
    <text x="610" y="218" text-anchor="middle" fill="#FF8A65" font-size="11" font-family="monospace" font-weight="700" opacity="0.8">ARM</text>
    <text x="610" y="232" text-anchor="middle" fill="#FF8A65" font-size="10" font-family="monospace" opacity="0.6">Cortex</text>
    <!-- Left pins -->
    <rect x="490" y="147" width="22" height="7" rx="2" fill="#FF6B35" opacity="0.7"/>
    <rect x="490" y="162" width="22" height="7" rx="2" fill="#FF6B35" opacity="0.7"/>
    <rect x="490" y="177" width="22" height="7" rx="2" fill="#FF6B35" opacity="0.7"/>
    <rect x="490" y="192" width="22" height="7" rx="2" fill="#FF6B35" opacity="0.7"/>
    <rect x="490" y="207" width="22" height="7" rx="2" fill="#FF6B35" opacity="0.5"/>
    <rect x="490" y="222" width="22" height="7" rx="2" fill="#FF6B35" opacity="0.5"/>
    <rect x="490" y="237" width="22" height="7" rx="2" fill="#FF6B35" opacity="0.5"/>
    <rect x="490" y="252" width="22" height="7" rx="2" fill="#FF6B35" opacity="0.5"/>
    <rect x="490" y="267" width="22" height="7" rx="2" fill="#FF6B35" opacity="0.5"/>
    <!-- Right pins -->
    <rect x="708" y="147" width="22" height="7" rx="2" fill="#FF6B35" opacity="0.7"/>
    <rect x="708" y="162" width="22" height="7" rx="2" fill="#FF6B35" opacity="0.7"/>
    <rect x="708" y="177" width="22" height="7" rx="2" fill="#FF6B35" opacity="0.7"/>
    <rect x="708" y="192" width="22" height="7" rx="2" fill="#FF6B35" opacity="0.7"/>
    <rect x="708" y="207" width="22" height="7" rx="2" fill="#FF6B35" opacity="0.5"/>
    <rect x="708" y="222" width="22" height="7" rx="2" fill="#FF6B35" opacity="0.5"/>
    <rect x="708" y="237" width="22" height="7" rx="2" fill="#FF6B35" opacity="0.5"/>
    <rect x="708" y="252" width="22" height="7" rx="2" fill="#FF6B35" opacity="0.5"/>
    <rect x="708" y="267" width="22" height="7" rx="2" fill="#FF6B35" opacity="0.5"/>
    <!-- Top pins -->
    <rect x="547" y="102" width="7" height="22" rx="2" fill="#FF6B35" opacity="0.7"/>
    <rect x="562" y="102" width="7" height="22" rx="2" fill="#FF6B35" opacity="0.7"/>
    <rect x="577" y="102" width="7" height="22" rx="2" fill="#FF6B35" opacity="0.5"/>
    <rect x="592" y="102" width="7" height="22" rx="2" fill="#FF6B35" opacity="0.5"/>
    <rect x="607" y="102" width="7" height="22" rx="2" fill="#FF6B35" opacity="0.5"/>
    <rect x="622" y="102" width="7" height="22" rx="2" fill="#FF6B35" opacity="0.7"/>
    <rect x="637" y="102" width="7" height="22" rx="2" fill="#FF6B35" opacity="0.7"/>
    <!-- Bottom pins -->
    <rect x="547" y="316" width="7" height="22" rx="2" fill="#FF6B35" opacity="0.7"/>
    <rect x="562" y="316" width="7" height="22" rx="2" fill="#FF6B35" opacity="0.7"/>
    <rect x="577" y="316" width="7" height="22" rx="2" fill="#FF6B35" opacity="0.5"/>
    <rect x="592" y="316" width="7" height="22" rx="2" fill="#FF6B35" opacity="0.5"/>
    <rect x="607" y="316" width="7" height="22" rx="2" fill="#FF6B35" opacity="0.5"/>
    <rect x="622" y="316" width="7" height="22" rx="2" fill="#FF6B35" opacity="0.7"/>
    <rect x="637" y="316" width="7" height="22" rx="2" fill="#FF6B35" opacity="0.7"/>

    <!-- Watermark text -->
    <text x="700" y="380" font-size="200" font-family="monospace" font-weight="900" fill="rgba(255,107,53,0.04)" text-anchor="middle" dominant-baseline="middle">C</text>

    <!-- Content (left) -->
    <g transform="translate(60, 90)">
        <!-- Top Tech Pill -->
        <rect x="0" y="0" width="155" height="32" rx="16" fill="rgba(255,107,53,0.15)" stroke="rgba(255,107,53,0.4)" stroke-width="1" />
        <circle cx="16" cy="16" r="6" fill="#FF6B35" />
        <text x="32" y="21" fill="#FF8A65" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" letter-spacing="1">HARDWARE TRACK</text>

        <!-- Main Title -->
        <text x="0" y="95" fill="#ffffff" font-size="44" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">Embedded</text>
        <text x="0" y="148" fill="#FF8A65" font-size="44" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">Systems</text>

        <!-- Subtitle -->
        <text x="0" y="195" fill="rgba(255,255,255,0.65)" font-size="20" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="400">C Programming &amp; ARM Architecture</text>

        <!-- Tags row -->
        <rect x="0" y="218" width="62" height="28" rx="14" fill="rgba(255,107,53,0.2)" stroke="rgba(255,107,53,0.4)" stroke-width="1"/>
        <text x="31" y="237" text-anchor="middle" fill="#FF8A65" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">C Lang</text>

        <rect x="74" y="218" width="52" height="28" rx="14" fill="rgba(255,107,53,0.2)" stroke="rgba(255,107,53,0.4)" stroke-width="1"/>
        <text x="100" y="237" text-anchor="middle" fill="#FF8A65" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">ARM</text>

        <rect x="138" y="218" width="60" height="28" rx="14" fill="rgba(255,107,53,0.2)" stroke="rgba(255,107,53,0.4)" stroke-width="1"/>
        <text x="168" y="237" text-anchor="middle" fill="#FF8A65" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">RTOS</text>

        <!-- CTA button -->
        <rect x="0" y="260" width="150" height="44" rx="10" fill="#FF6B35" opacity="0.9" filter="url(#glow)"/>
        <text x="75" y="288" fill="#ffffff" font-size="16" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" text-anchor="middle">Enroll Now →</text>
    </g>
</svg>