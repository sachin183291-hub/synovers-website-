<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4ADE80" />
            <stop offset="100%" stop-color="#22D3EE" />
        </linearGradient>
        <pattern id="gridPattern2" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
            <circle cx="40" cy="40" r="1.5" fill="rgba(255,255,255,0.15)"/>
        </pattern>
        <filter id="softGlow2" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="80" />
        </filter>
        <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- Base Background -->
    <rect width="800" height="450" fill="#0F172A" />

    <!-- Giant Glowing Orbs -->
    <circle cx="50" cy="50" r="280" fill="#4ADE80" opacity="0.18" filter="url(#softGlow2)" />
    <circle cx="780" cy="420" r="280" fill="#22D3EE" opacity="0.18" filter="url(#softGlow2)" />

    <!-- Grid Overlay -->
    <rect width="800" height="450" fill="url(#gridPattern2)" />

    <!-- IoT connection arcs (right side) -->
    <!-- Raspberry Pi board -->
    <rect x="490" y="100" width="240" height="170" rx="12" fill="#1E293B" stroke="#4ADE80" stroke-width="1.5" opacity="0.9"/>
    <rect x="504" y="114" width="212" height="142" rx="8" fill="#0F172A" opacity="0.5"/>
    <!-- Pi logo placeholder -->
    <circle cx="565" cy="165" r="28" fill="#4ADE80" opacity="0.15" stroke="#4ADE80" stroke-width="1.5"/>
    <text x="565" y="170" text-anchor="middle" fill="#4ADE80" font-size="22" font-family="monospace" font-weight="900" opacity="0.9">π</text>
    <!-- GPIO pins -->
    <rect x="504" y="100" width="6" height="8" rx="1" fill="#86EFAC" opacity="0.8"/>
    <rect x="514" y="100" width="6" height="8" rx="1" fill="#86EFAC" opacity="0.8"/>
    <rect x="524" y="100" width="6" height="8" rx="1" fill="#86EFAC" opacity="0.6"/>
    <rect x="534" y="100" width="6" height="8" rx="1" fill="#86EFAC" opacity="0.6"/>
    <rect x="544" y="100" width="6" height="8" rx="1" fill="#86EFAC" opacity="0.6"/>
    <rect x="554" y="100" width="6" height="8" rx="1" fill="#86EFAC" opacity="0.6"/>
    <rect x="564" y="100" width="6" height="8" rx="1" fill="#86EFAC" opacity="0.4"/>
    <rect x="574" y="100" width="6" height="8" rx="1" fill="#86EFAC" opacity="0.4"/>
    <!-- chips on board -->
    <rect x="620" y="135" width="44" height="44" rx="4" fill="#1A2E22" stroke="#4ADE80" stroke-width="1" opacity="0.8"/>
    <text x="642" y="162" text-anchor="middle" fill="#4ADE80" font-size="9" font-family="monospace" opacity="0.7">CPU</text>
    <!-- Arduino board below -->
    <rect x="510" y="290" width="200" height="120" rx="10" fill="#1A2438" stroke="#22D3EE" stroke-width="1.5" opacity="0.9"/>
    <rect x="522" y="302" width="176" height="96" rx="6" fill="#0F172A" opacity="0.5"/>
    <text x="610" y="348" text-anchor="middle" fill="#22D3EE" font-size="14" font-family="monospace" font-weight="700" opacity="0.85">Arduino</text>
    <text x="610" y="368" text-anchor="middle" fill="#22D3EE" font-size="11" font-family="monospace" opacity="0.6">UNO R3</text>
    <!-- Sensor boxes connected -->
    <rect x="390" y="170" width="80" height="50" rx="8" fill="#1E293B" stroke="#4ADE80" stroke-width="1" opacity="0.7"/>
    <text x="430" y="200" text-anchor="middle" fill="#4ADE80" font-size="11" font-family="monospace" opacity="0.8">DHT22</text>
    <!-- connection lines -->
    <line x1="470" y1="195" x2="490" y2="185" stroke="#4ADE80" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
    <line x1="610" y1="270" x2="610" y2="290" stroke="#22D3EE" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
    <!-- WiFi signal arcs -->
    <path d="M 670 80 Q 690 60 710 80" stroke="#4ADE80" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M 660 70 Q 690 45 720 70" stroke="#4ADE80" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M 650 60 Q 690 30 730 60" stroke="#4ADE80" stroke-width="1" fill="none" opacity="0.25"/>
    <circle cx="690" cy="82" r="3" fill="#4ADE80" opacity="0.8"/>

    <!-- Content (left) -->
    <g transform="translate(60, 90)">
        <!-- Top Tech Pill -->
        <rect x="0" y="0" width="155" height="32" rx="16" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.35)" stroke-width="1" />
        <circle cx="16" cy="16" r="6" fill="#4ADE80" />
        <text x="32" y="21" fill="#4ADE80" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" letter-spacing="1">HARDWARE TRACK</text>

        <!-- Main Title -->
        <text x="0" y="95" fill="#ffffff" font-size="42" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">IoT with</text>
        <text x="0" y="148" fill="#4ADE80" font-size="42" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">Raspberry Pi</text>

        <!-- Subtitle -->
        <text x="0" y="195" fill="rgba(255,255,255,0.65)" font-size="20" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="400">&amp; Arduino Programming</text>

        <!-- Tags row -->
        <rect x="0" y="218" width="100" height="28" rx="14" fill="rgba(74,222,128,0.15)" stroke="rgba(74,222,128,0.4)" stroke-width="1"/>
        <text x="50" y="237" text-anchor="middle" fill="#4ADE80" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">Raspberry Pi</text>

        <rect x="112" y="218" width="72" height="28" rx="14" fill="rgba(34,211,238,0.15)" stroke="rgba(34,211,238,0.4)" stroke-width="1"/>
        <text x="148" y="237" text-anchor="middle" fill="#22D3EE" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">Arduino</text>

        <rect x="196" y="218" width="58" height="28" rx="14" fill="rgba(74,222,128,0.15)" stroke="rgba(74,222,128,0.4)" stroke-width="1"/>
        <text x="225" y="237" text-anchor="middle" fill="#4ADE80" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">MQTT</text>

        <!-- CTA button -->
        <rect x="0" y="260" width="150" height="44" rx="10" fill="url(#bgGrad2)" opacity="0.9" filter="url(#glow2)"/>
        <text x="75" y="288" fill="#0F172A" font-size="16" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" text-anchor="middle">Enroll Now →</text>
    </g>
</svg>