<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="qaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#22C55E" />
            <stop offset="100%" stop-color="#4ADE80" />
        </linearGradient>
        <pattern id="qaGrid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
            <circle cx="40" cy="40" r="1.5" fill="rgba(255,255,255,0.15)"/>
        </pattern>
        <filter id="qaSoftGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="80" />
        </filter>
        <filter id="qaGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <rect width="800" height="450" fill="#0F172A" />
    <circle cx="70" cy="70" r="270" fill="#15803D" opacity="0.22" filter="url(#qaSoftGlow)" />
    <circle cx="760" cy="390" r="260" fill="#22C55E" opacity="0.18" filter="url(#qaSoftGlow)" />
    <rect width="800" height="450" fill="url(#qaGrid)" />

    <!-- Testing visualization (right side) -->
    <!-- Test runner terminal -->
    <rect x="460" y="75" width="315" height="300" rx="12" fill="#0A1510" stroke="#22C55E" stroke-width="1.5" opacity="0.95"/>
    <rect x="460" y="75" width="315" height="30" rx="12" fill="#0F2010" opacity="0.9"/>
    <rect x="460" y="92" width="315" height="13" fill="#0F2010"/>
    <circle cx="478" cy="90" r="5" fill="#EF4444" opacity="0.7"/>
    <circle cx="494" cy="90" r="5" fill="#F59E0B" opacity="0.7"/>
    <circle cx="510" cy="90" r="5" fill="#22C55E" opacity="0.9"/>
    <text x="617" y="95" text-anchor="middle" fill="#4ADE80" font-size="11" font-family="monospace">Test Runner — Selenium</text>

    <!-- Test results -->
    <text x="475" y="122" fill="#22C55E" font-size="11" font-family="monospace" opacity="0.9">✓ Login page loads correctly</text>
    <text x="475" y="138" fill="#22C55E" font-size="11" font-family="monospace" opacity="0.9">✓ Form validation — email field</text>
    <text x="475" y="154" fill="#22C55E" font-size="11" font-family="monospace" opacity="0.9">✓ API response within 200ms</text>
    <text x="475" y="170" fill="#22C55E" font-size="11" font-family="monospace" opacity="0.85">✓ User registration flow</text>
    <text x="475" y="186" fill="#EF4444" font-size="11" font-family="monospace" opacity="0.9">✗ Payment gateway timeout</text>
    <text x="475" y="202" fill="#22C55E" font-size="11" font-family="monospace" opacity="0.85">✓ Dashboard renders — 0.8s</text>
    <text x="475" y="218" fill="#22C55E" font-size="11" font-family="monospace" opacity="0.8">✓ Mobile responsive layout</text>
    <text x="475" y="234" fill="#F59E0B" font-size="11" font-family="monospace" opacity="0.85">⚠ Slow DB query — 340ms</text>
    <text x="475" y="250" fill="#22C55E" font-size="11" font-family="monospace" opacity="0.8">✓ API endpoints — all 200 OK</text>
    <text x="475" y="266" fill="#22C55E" font-size="11" font-family="monospace" opacity="0.75">✓ Cross-browser compatibility</text>

    <!-- Separator -->
    <line x1="468" y1="278" x2="762" y2="278" stroke="#22C55E" stroke-width="0.5" opacity="0.3"/>

    <!-- Summary stats -->
    <text x="475" y="296" fill="#4ADE80" font-size="11" font-family="monospace" opacity="0.9">Test Suites: 4 passed (1 failed)</text>
    <text x="475" y="312" fill="#4ADE80" font-size="11" font-family="monospace" opacity="0.85">Tests:       27 passed, 1 failed</text>
    <text x="475" y="328" fill="#4ADE80" font-size="11" font-family="monospace" opacity="0.8">Time:        4.8s</text>
    <!-- Coverage bar -->
    <text x="475" y="347" fill="#86EFAC" font-size="10" font-family="monospace" opacity="0.8">Coverage</text>
    <rect x="540" y="337" width="200" height="12" rx="4" fill="#1A2E1A" opacity="0.8"/>
    <rect x="540" y="337" width="174" height="12" rx="4" fill="#22C55E" opacity="0.8"/>
    <text x="746" y="348" fill="#4ADE80" font-size="10" font-family="monospace" opacity="0.9">87%</text>

    <!-- Tool icons at bottom -->
    <rect x="468" y="357" width="294" height="10" rx="3" fill="#0A1510" opacity="0.5"/>
    <text x="475" y="368" fill="#22C55E" font-size="10" font-family="monospace" opacity="0.6">Selenium  ·  Cypress  ·  JMeter  ·  Postman  ·  JIRA</text>

    <!-- Content (left) -->
    <g transform="translate(60, 90)">
        <rect x="0" y="0" width="150" height="32" rx="16" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.35)" stroke-width="1" />
        <circle cx="16" cy="16" r="6" fill="#22C55E" />
        <text x="32" y="21" fill="#4ADE80" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" letter-spacing="1">TESTING TRACK</text>

        <text x="0" y="95" fill="#ffffff" font-size="40" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">Software</text>
        <text x="0" y="148" fill="#4ADE80" font-size="40" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">Testing &amp; QA</text>
        <text x="0" y="195" fill="rgba(255,255,255,0.65)" font-size="18" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="400">Manual + Automation Testing</text>

        <rect x="0" y="218" width="78" height="28" rx="14" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.4)" stroke-width="1"/>
        <text x="39" y="237" text-anchor="middle" fill="#4ADE80" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">Selenium</text>
        <rect x="90" y="218" width="68" height="28" rx="14" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.4)" stroke-width="1"/>
        <text x="124" y="237" text-anchor="middle" fill="#4ADE80" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">Cypress</text>
        <rect x="170" y="218" width="68" height="28" rx="14" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.4)" stroke-width="1"/>
        <text x="204" y="237" text-anchor="middle" fill="#4ADE80" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">JMeter</text>

        <rect x="0" y="260" width="150" height="44" rx="10" fill="url(#qaGrad)" opacity="0.9" filter="url(#qaGlow)"/>
        <text x="75" y="288" fill="#0F172A" font-size="16" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" text-anchor="middle">Enroll Now →</text>
    </g>
</svg>