<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="javawebGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#EF4444" />
            <stop offset="100%" stop-color="#F97316" />
        </linearGradient>
        <pattern id="javawebGrid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
            <circle cx="40" cy="40" r="1.5" fill="rgba(255,255,255,0.15)"/>
        </pattern>
        <filter id="javawebSoftGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="80" />
        </filter>
        <filter id="javawebGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <rect width="800" height="450" fill="#0F172A" />
    <circle cx="70" cy="70" r="270" fill="#991B1B" opacity="0.22" filter="url(#javawebSoftGlow)" />
    <circle cx="760" cy="390" r="260" fill="#EF4444" opacity="0.18" filter="url(#javawebSoftGlow)" />
    <rect width="800" height="450" fill="url(#javawebGrid)" />

    <!-- Web app architecture diagram -->
    <!-- Client -->
    <rect x="462" y="85" width="90" height="60" rx="10" fill="#1A0808" stroke="#EF4444" stroke-width="1.5" opacity="0.9"/>
    <text x="507" y="110" text-anchor="middle" fill="#FCA5A5" font-size="11" font-family="monospace" font-weight="700">Browser</text>
    <text x="507" y="126" text-anchor="middle" fill="#F87171" font-size="10" font-family="monospace">HTML/CSS/JS</text>
    <!-- HTTP arrow -->
    <line x1="552" y1="115" x2="590" y2="115" stroke="#EF4444" stroke-width="2" opacity="0.7"/>
    <text x="571" y="108" text-anchor="middle" fill="#F87171" font-size="8" font-family="monospace" opacity="0.8">HTTP</text>
    <!-- Spring Boot Controller -->
    <rect x="590" y="75" width="110" height="80" rx="10" fill="#1A0808" stroke="#F97316" stroke-width="1.5" opacity="0.9"/>
    <rect x="598" y="82" width="94" height="18" rx="4" fill="#7C2D12" opacity="0.7"/>
    <text x="645" y="95" text-anchor="middle" fill="#FDBA74" font-size="9" font-family="monospace">@RestController</text>
    <text x="645" y="114" text-anchor="middle" fill="#FCA5A5" font-size="10" font-family="monospace">Spring MVC</text>
    <text x="645" y="130" text-anchor="middle" fill="#F87171" font-size="9" font-family="monospace">Dispatcher</text>
    <text x="645" y="145" text-anchor="middle" fill="#F87171" font-size="9" font-family="monospace">Servlet</text>
    <!-- Service layer arrow -->
    <line x1="700" y1="115" x2="720" y2="115" stroke="#EF4444" stroke-width="2" opacity="0.7"/>
    <!-- Service -->
    <rect x="720" y="85" width="90" height="60" rx="10" fill="#1A0808" stroke="#EF4444" stroke-width="1.5" opacity="0.9"/>
    <rect x="728" y="91" width="74" height="14" rx="3" fill="#7C2D12" opacity="0.6"/>
    <text x="765" y="101" text-anchor="middle" fill="#FDBA74" font-size="9" font-family="monospace">@Service</text>
    <text x="765" y="116" text-anchor="middle" fill="#FCA5A5" font-size="10" font-family="monospace">Business</text>
    <text x="765" y="130" text-anchor="middle" fill="#F87171" font-size="9" font-family="monospace">Logic + AI</text>

    <!-- DB and AI below -->
    <line x1="645" y1="155" x2="645" y2="185" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
    <line x1="765" y1="145" x2="765" y2="185" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
    <!-- JPA/DB -->
    <rect x="590" y="185" width="110" height="60" rx="10" fill="#1A0808" stroke="#F97316" stroke-width="1.5" opacity="0.9"/>
    <rect x="598" y="192" width="94" height="14" rx="3" fill="#7C2D12" opacity="0.6"/>
    <text x="645" y="202" text-anchor="middle" fill="#FDBA74" font-size="9" font-family="monospace">@Repository</text>
    <text x="645" y="218" text-anchor="middle" fill="#FCA5A5" font-size="10" font-family="monospace">JPA / MySQL</text>
    <text x="645" y="233" text-anchor="middle" fill="#F87171" font-size="9" font-family="monospace">Hibernate ORM</text>
    <!-- AI API -->
    <rect x="720" y="185" width="90" height="60" rx="10" fill="#1A1008" stroke="#F97316" stroke-width="1.5" opacity="0.9"/>
    <rect x="728" y="192" width="74" height="14" rx="3" fill="#78350F" opacity="0.7"/>
    <text x="765" y="202" text-anchor="middle" fill="#FDE68A" font-size="9" font-family="monospace">AI Service</text>
    <text x="765" y="218" text-anchor="middle" fill="#FDE68A" font-size="10" font-family="monospace">OpenAI API</text>
    <text x="765" y="233" text-anchor="middle" fill="#FCD34D" font-size="9" font-family="monospace">GPT-4o</text>

    <!-- Code snippet below architecture -->
    <rect x="462" y="265" width="350" height="115" rx="10" fill="#0A0808" stroke="#EF4444" stroke-width="1" opacity="0.9"/>
    <text x="472" y="283" fill="#FDBA74" font-size="10" font-family="monospace" opacity="0.8">@GetMapping("/ai-response")</text>
    <text x="472" y="298" fill="#F87171" font-size="10" font-family="monospace" opacity="0.75">public ResponseEntity&lt;String&gt; getAI(</text>
    <text x="472" y="313" fill="#F87171" font-size="10" font-family="monospace" opacity="0.7">    @RequestParam String prompt) {'{'}</text>
    <text x="472" y="328" fill="#FCA5A5" font-size="10" font-family="monospace" opacity="0.7">  String res = aiService.query(prompt);</text>
    <text x="472" y="343" fill="#FCA5A5" font-size="10" font-family="monospace" opacity="0.65">  return ResponseEntity.ok(res);</text>
    <text x="472" y="358" fill="#F87171" font-size="10" font-family="monospace" opacity="0.7">{'}'}</text>
    <!-- Green status dot -->
    <circle cx="793" cy="275" r="5" fill="#22C55E" opacity="0.8"/>

    <!-- Content (left) -->
    <g transform="translate(60, 90)">
        <rect x="0" y="0" width="150" height="32" rx="16" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.35)" stroke-width="1" />
        <circle cx="16" cy="16" r="6" fill="#EF4444" />
        <text x="32" y="21" fill="#FCA5A5" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" letter-spacing="1">WEB TRACK</text>

        <text x="0" y="95" fill="#ffffff" font-size="42" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">Java + AI</text>
        <text x="0" y="148" fill="#FCA5A5" font-size="42" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">Web Dev</text>
        <text x="0" y="195" fill="rgba(255,255,255,0.65)" font-size="18" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="400">Spring Boot &amp; AI-Powered APIs</text>

        <rect x="0" y="218" width="54" height="28" rx="14" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
        <text x="27" y="237" text-anchor="middle" fill="#FCA5A5" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">Java</text>
        <rect x="66" y="218" width="90" height="28" rx="14" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
        <text x="111" y="237" text-anchor="middle" fill="#FCA5A5" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">Spring Boot</text>
        <rect x="168" y="218" width="56" height="28" rx="14" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
        <text x="196" y="237" text-anchor="middle" fill="#FCA5A5" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">REST</text>

        <rect x="0" y="260" width="150" height="44" rx="10" fill="url(#javawebGrad)" opacity="0.9" filter="url(#javawebGlow)"/>
        <text x="75" y="288" fill="#ffffff" font-size="16" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" text-anchor="middle">Enroll Now →</text>
    </g>
</svg>