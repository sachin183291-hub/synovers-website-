<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="genGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#14B8A6" />
            <stop offset="100%" stop-color="#5EEAD4" />
        </linearGradient>
        <pattern id="genGrid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
            <circle cx="40" cy="40" r="1.5" fill="rgba(255,255,255,0.15)"/>
        </pattern>
        <filter id="genSoftGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="80" />
        </filter>
        <filter id="genGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <rect width="800" height="450" fill="#0F172A" />
    <circle cx="70" cy="60" r="270" fill="#0F766E" opacity="0.25" filter="url(#genSoftGlow)" />
    <circle cx="760" cy="400" r="270" fill="#14B8A6" opacity="0.2" filter="url(#genSoftGlow)" />
    <rect width="800" height="450" fill="url(#genGrid)" />

    <!-- Chat / prompt interface visualization (right side) -->
    <!-- Chat window frame -->
    <rect x="460" y="75" width="310" height="310" rx="16" fill="#0A1F1E" stroke="#14B8A6" stroke-width="1.5" opacity="0.95"/>
    <!-- Title bar -->
    <rect x="460" y="75" width="310" height="38" rx="16" fill="#0F2A28" opacity="0.9"/>
    <rect x="460" y="96" width="310" height="17" fill="#0F2A28"/>
    <circle cx="480" cy="94" r="5" fill="#EF4444" opacity="0.7"/>
    <circle cx="496" cy="94" r="5" fill="#F59E0B" opacity="0.7"/>
    <circle cx="512" cy="94" r="5" fill="#22C55E" opacity="0.7"/>
    <text x="615" y="98" text-anchor="middle" fill="#5EEAD4" font-size="11" font-family="monospace" opacity="0.8">GenAI Chat</text>

    <!-- User bubble -->
    <rect x="560" y="125" width="190" height="36" rx="14" fill="#134E4A" stroke="#14B8A6" stroke-width="1" opacity="0.9"/>
    <text x="655" y="140" text-anchor="middle" fill="#ffffff" font-size="11" font-family="Segoe UI, sans-serif" opacity="0.9">Write me a Python function</text>
    <text x="655" y="154" text-anchor="middle" fill="#ffffff" font-size="11" font-family="Segoe UI, sans-serif" opacity="0.9">to sort a list 🐍</text>

    <!-- AI response bubble -->
    <rect x="468" y="172" width="220" height="100" rx="12" fill="#0D3330" stroke="#2DD4BF" stroke-width="1" opacity="0.9"/>
    <text x="478" y="192" fill="#5EEAD4" font-size="10" font-family="monospace" opacity="0.9">def bubble_sort(arr):</text>
    <text x="490" y="207" fill="#5EEAD4" font-size="10" font-family="monospace" opacity="0.8">  n = len(arr)</text>
    <text x="490" y="222" fill="#5EEAD4" font-size="10" font-family="monospace" opacity="0.8">  for i in range(n):</text>
    <text x="502" y="237" fill="#A5F3FC" font-size="10" font-family="monospace" opacity="0.7">    for j in range(n-1):</text>
    <text x="502" y="252" fill="#A5F3FC" font-size="10" font-family="monospace" opacity="0.65">      swap(arr[j],arr[j+1])</text>
    <!-- AI label -->
    <rect x="468" y="172" width="38" height="16" rx="6" fill="#14B8A6" opacity="0.8"/>
    <text x="487" y="183" text-anchor="middle" fill="#ffffff" font-size="9" font-family="monospace" font-weight="700">GPT</text>

    <!-- Second user bubble -->
    <rect x="568" y="285" width="182" height="28" rx="12" fill="#134E4A" stroke="#14B8A6" stroke-width="1" opacity="0.85"/>
    <text x="659" y="299" text-anchor="middle" fill="#ffffff" font-size="11" font-family="Segoe UI, sans-serif" opacity="0.9">Explain LLM architecture</text>
    <text x="659" y="312" text-anchor="middle" fill="#ffffff" font-size="10" font-family="Segoe UI, sans-serif" opacity="0.7">in simple terms</text>

    <!-- Typing indicator -->
    <rect x="468" y="325" width="80" height="28" rx="12" fill="#0D3330" stroke="#2DD4BF" stroke-width="1" opacity="0.8"/>
    <circle cx="485" cy="339" r="4" fill="#14B8A6" opacity="0.9"/>
    <circle cx="499" cy="339" r="4" fill="#14B8A6" opacity="0.6"/>
    <circle cx="513" cy="339" r="4" fill="#14B8A6" opacity="0.35"/>

    <!-- Input bar -->
    <rect x="468" y="365" width="290" height="32" rx="12" fill="#0D2E2C" stroke="#14B8A6" stroke-width="1" opacity="0.8"/>
    <text x="480" y="385" fill="#5EEAD4" font-size="11" font-family="monospace" opacity="0.6">Enter your prompt...</text>
    <rect x="742" y="368" width="10" height="26" rx="3" fill="#14B8A6" opacity="0.7"/>

    <!-- Token / LLM wave decoration -->
    <path d="M 462 420 Q 480 410 498 420 Q 516 430 534 420 Q 552 410 570 420" stroke="#14B8A6" stroke-width="1.5" fill="none" opacity="0.3"/>

    <!-- Content (left) -->
    <g transform="translate(60, 90)">
        <rect x="0" y="0" width="140" height="32" rx="16" fill="rgba(20,184,166,0.12)" stroke="rgba(20,184,166,0.35)" stroke-width="1" />
        <circle cx="16" cy="16" r="6" fill="#14B8A6" />
        <text x="32" y="21" fill="#5EEAD4" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" letter-spacing="1">AI &amp; ML TRACK</text>

        <text x="0" y="95" fill="#ffffff" font-size="40" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">Generative AI</text>
        <text x="0" y="148" fill="#5EEAD4" font-size="40" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">&amp; Prompt Eng.</text>
        <text x="0" y="195" fill="rgba(255,255,255,0.65)" font-size="18" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="400">ChatGPT, LLMs &amp; AI Agents</text>

        <rect x="0" y="218" width="76" height="28" rx="14" fill="rgba(20,184,166,0.15)" stroke="rgba(20,184,166,0.4)" stroke-width="1"/>
        <text x="38" y="237" text-anchor="middle" fill="#5EEAD4" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">ChatGPT</text>
        <rect x="88" y="218" width="84" height="28" rx="14" fill="rgba(20,184,166,0.15)" stroke="rgba(20,184,166,0.4)" stroke-width="1"/>
        <text x="130" y="237" text-anchor="middle" fill="#5EEAD4" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">LangChain</text>
        <rect x="184" y="218" width="58" height="28" rx="14" fill="rgba(20,184,166,0.15)" stroke="rgba(20,184,166,0.4)" stroke-width="1"/>
        <text x="213" y="237" text-anchor="middle" fill="#5EEAD4" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">Agents</text>

        <rect x="0" y="260" width="150" height="44" rx="10" fill="url(#genGrad)" opacity="0.9" filter="url(#genGlow)"/>
        <text x="75" y="288" fill="#0F172A" font-size="16" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" text-anchor="middle">Enroll Now →</text>
    </g>
</svg>