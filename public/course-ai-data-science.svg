    <rect x="636" y="326" width="26" height="26" rx="3" fill="#1D4ED8" opacity="0.8"/>
    <text x="649" y="343" text-anchor="middle" fill="#fff" font-size="10" font-family="monospace">42</text>
    <rect x="665" y="326" width="26" height="26" rx="3" fill="#0A1525" stroke="#3B82F6" stroke-width="1" opacity="0.6"/>
    <text x="678" y="343" text-anchor="middle" fill="#60A5FA" font-size="10" font-family="monospace">3</text>
    <rect x="636" y="355" width="26" height="12" rx="3" fill="#0A1525" stroke="#3B82F6" stroke-width="1" opacity="0.6"/>
    <text x="649" y="364" text-anchor="middle" fill="#60A5FA" font-size="10" font-family="monospace">5</text>
    <rect x="665" y="355" width="26" height="12" rx="3" fill="#3B82F6" opacity="0.7"/>
    <text x="678" y="364" text-anchor="middle" fill="#fff" font-size="10" font-family="monospace">38</text>

