        <text x="0" y="148" fill="#60A5FA" font-size="44" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="800" letter-spacing="-1">Science</text>
        <text x="0" y="195" fill="rgba(255,255,255,0.65)" font-size="19" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="400">ML Pipelines &amp; AI Insights</text>

        <rect x="0" y="218" width="66" height="28" rx="14" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
        <text x="33" y="237" text-anchor="middle" fill="#60A5FA" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">Python</text>
        <rect x="78" y="218" width="60" height="28" rx="14" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
        <text x="108" y="237" text-anchor="middle" fill="#60A5FA" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">Pandas</text>
        <rect x="150" y="218" width="68" height="28" rx="14" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
        <text x="184" y="237" text-anchor="middle" fill="#60A5FA" font-size="13" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="600">Tableau</text>

        <rect x="0" y="260" width="150" height="44" rx="10" fill="url(#dsGrad)" opacity="0.9" filter="url(#dsGlow)"/>
        <text x="75" y="288" fill="#ffffff" font-size="16" font-family="Segoe UI, -apple-system, Roboto, sans-serif" font-weight="700" text-anchor="middle">Enroll Now →</text>
