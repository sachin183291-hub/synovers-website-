    <g transform="translate(60, 90)">
        <rect x="0" y="0" width="155" height="32" rx="16" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.35)" stroke-width="1" />
        <circle cx="16" cy="16" r="6" fill="#3B82F6" />
