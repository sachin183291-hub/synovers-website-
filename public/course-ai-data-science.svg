    <rect x="712" y="130" width="24" height="24" rx="2" fill="#BFDBFE" opacity="0.9"/>
    <rect x="634" y="157" width="24" height="24" rx="2" fill="#1E3A5F" opacity="0.9"/>
    <rect x="660" y="157" width="24" height="24" rx="2" fill="#1D4ED8" opacity="0.9"/>
