<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="dsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3B82F6" />
            <stop offset="100%" stop-color="#60A5FA" />
        </linearGradient>
        <pattern id="dsGrid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
            <circle cx="40" cy="40" r="1.5" fill="rgba(255,255,255,0.15)"/>
        </pattern>
        <filter id="dsSoftGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="80" />
        </filter>
        <filter id="dsGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <rect width="800" height="450" fill="#0F172A" />
    <circle cx="70" cy="70" r="270" fill="#1D4ED8" opacity="0.22" filter="url(#dsSoftGlow)" />
    <circle cx="760" cy="400" r="260" fill="#3B82F6" opacity="0.2" filter="url(#dsSoftGlow)" />
    <rect width="800" height="450" fill="url(#dsGrid)" />

    <!-- Data Science / ML Pipeline visualization (right side) -->
    <!-- Scatter plot -->
    <rect x="460" y="80" width="150" height="130" rx="10" fill="#0A1525" stroke="#3B82F6" stroke-width="1.5" opacity="0.9"/>
    <text x="535" y="97" text-anchor="middle" fill="#60A5FA" font-size="10" font-family="monospace" opacity="0.8">Scatter Plot</text>
    <!-- Grid lines -->
    <line x1="472" y1="110" x2="598" y2="110" stroke="#3B82F6" stroke-width="0.5" opacity="0.2"/>
    <line x1="472" y1="128" x2="598" y2="128" stroke="#3B82F6" stroke-width="0.5" opacity="0.2"/>
    <line x1="472" y1="146" x2="598" y2="146" stroke="#3B82F6" stroke-width="0.5" opacity="0.2"/>
    <line x1="472" y1="164" x2="598" y2="164" stroke="#3B82F6" stroke-width="0.5" opacity="0.2"/>
    <!-- Data points (cluster 1 - blue) -->
    <circle cx="490" cy="155" r="4" fill="#3B82F6" opacity="0.8"/>
    <circle cx="500" cy="148" r="4" fill="#3B82F6" opacity="0.8"/>
    <circle cx="510" cy="160" r="4" fill="#3B82F6" opacity="0.7"/>
    <circle cx="505" cy="143" r="3" fill="#3B82F6" opacity="0.7"/>
    <circle cx="495" cy="168" r="3" fill="#60A5FA" opacity="0.7"/>
    <!-- Data points (cluster 2 - cyan) -->
    <circle cx="548" cy="115" r="4" fill="#22D3EE" opacity="0.8"/>
    <circle cx="558" cy="120" r="4" fill="#22D3EE" opacity="0.8"/>
    <circle cx="554" cy="108" r="3" fill="#22D3EE" opacity="0.7"/>
    <circle cx="565" cy="125" r="3" fill="#67E8F9" opacity="0.7"/>
